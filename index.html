<title>Expedições Pantaneiras</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans','Segoe UI',Arial,sans-serif;min-height:100vh;overflow-x:hidden;background:#f5f5f5}
.sc{min-height:100vh;display:flex;flex-direction:column;animation:fIn .4s ease}
@keyframes fIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.btn{border:none;border-radius:12px;padding:12px 24px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit}
.btn:hover{transform:translateY(-2px);filter:brightness(.92)}
.btn:active{transform:translateY(0)}
.cbtn{width:100%;text-align:left;border-radius:12px;padding:14px 18px;font-size:14px;font-weight:600;cursor:pointer;border:2.5px solid transparent;transition:all .2s;font-family:inherit;line-height:1.5;background:white}
.cbtn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.12)}
.cbtn:disabled{cursor:default;transform:none}
.card{background:white;border-radius:18px;padding:22px;box-shadow:0 3px 20px rgba(0,0,0,.08)}
.exp-card{cursor:pointer;transition:transform .2s,box-shadow .2s;border-radius:18px;overflow:hidden;background:white;box-shadow:0 3px 18px rgba(0,0,0,.09)}
.exp-card:hover{transform:translateY(-5px);box-shadow:0 12px 40px rgba(0,0,0,.15)}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.dot{height:10px;border-radius:5px;transition:all .35s}
.sUp{animation:sUp .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes sUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.bubble{background:white;border-radius:18px 18px 18px 4px;padding:14px 18px;box-shadow:0 4px 18px rgba(0,0,0,.1);position:relative;line-height:1.65;font-size:14px;color:#212121}
.bubble::before{content:'';position:absolute;left:-8px;top:16px;border:8px solid transparent;border-right-color:white;border-left:0}
.intro-bg{background:linear-gradient(160deg,#1b5e20 0%,#004d40 40%,#0d47a1 100%);min-height:100vh}
.choice-btn{width:100%;text-align:left;border-radius:14px;padding:13px 18px;font-size:14px;font-weight:600;cursor:pointer;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.12);color:white;transition:all .2s;font-family:inherit;line-height:1.5;margin-bottom:8px}
.choice-btn:hover{background:rgba(255,255,255,.25);border-color:rgba(255,255,255,.6);transform:translateX(4px)}
.rank-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;margin-bottom:6px;background:#f9f9f9;font-size:13px}
.rank-row.top3{background:linear-gradient(90deg,#fff8e1,#fff)}
input.txt-in{width:100%;border:2.5px solid rgba(255,255,255,.4);border-radius:14px;padding:14px 18px;font-size:16px;font-family:inherit;outline:none;background:rgba(255,255,255,.15);color:white;transition:border .2s}
input.txt-in::placeholder{color:rgba(255,255,255,.55)}
input.txt-in:focus{border-color:rgba(255,255,255,.9);background:rgba(255,255,255,.2)}
input.name-input{width:100%;border:2px solid #e0e0e0;border-radius:12px;padding:12px 16px;font-size:16px;font-family:inherit;outline:none;transition:border .2s}
input.name-input:focus{border-color:#2e7d32}
.loading-ring{width:28px;height:28px;border:3px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>

y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Temperatura: 28.4°C</text></svg>","nar":"Você mergulha o multissensor na lagoa impactada. A tela mostra pH 6,1 e oxigênio dissolvido de 4,5 mg/L. Uma fina camada de cinzas cobre a superfície. O que esses valores indicam?","q":"O que significam pH 6,1 e O₂ 4,5 mg/L para a vida aquática?","cs":[{"l":"?","t":"pH ácido e oxigênio baixo, sinalizando estresse para peixes e biota aquática","p":10,"e":"✅","tp":"c","fb":"Correto! pH 6,1 é ácido (abaixo de 7). Peixes tropicais precisam de O₂ acima de 5 mg/L para sobreviver — 4,5 mg/L é valor crítico. As cinzas contribuem para ambas as alterações."},{"l":"?","t":"Condições neutras e oxigenação adequada, dentro dos padrões pantaneiros normais","p":0,"e":"❌","tp":"x","fb":"Atenção: pH 6,1 é ÁCIDO e O₂ 4,5 mg/L é baixo para peixes tropicais. Em lagoas saudáveis do Pantanal esperamos pH 6,5–8,0 e O₂ acima de 5 mg/L."},{"l":"?","t":"pH alcalino com oxigênio elevado, indicando recuperação após o impacto do fogo","p":0,"e":"❌","tp":"x","fb":"Esses valores indicam o oposto: pH ÁCIDO e oxigênio BAIXO, sugerindo estresse ambiental ativo. A lagoa está longe de estar em recuperação."}]},{"n":3,"title":"As Camadas","sub":"Perfil Vertical – 12h00","icon":"📊","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"ge0f7\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#e0f7fa\"/><stop offset=\"100%\" stop-color=\"#006064\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#ge0f7)\"/><rect y=\"98\" width=\"340\" height=\"72\" fill=\"#0277bd\" opacity=\".78\"/><line x1=\"0\" y1=\"112\" x2=\"340\" y2=\"112\" stroke=\"rgba(255,255,255,.3)\" stroke-width=\"1.5\"/><line x1=\"30\" y1=\"130\" x2=\"120\" y2=\"130\" stroke=\"rgba(255,255,255,.22)\" stroke-width=\"1\"/><line x1=\"200\" y1=\"140\" x2=\"310\" y2=\"140\" stroke=\"rgba(255,255,255,.22)\" stroke-width=\"1\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">ESTRATIFICAÇÃO</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Epilímnio: 30°C O₂: 7.2</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Hipolímnio: 18°C O₂: 0.8 mg/L</text></svg>","nar":"O sensor revela: temperatura cai de 30°C para 18°C em apenas 3 metros. Oxigênio: 7,2 mg/L em cima, 0,8 mg/L embaixo. Duas camadas radicalmente diferentes. Como se chama esse fenômeno?","q":"Qual é o nome da separação térmica entre camadas oxigenada e anóxica?","cs":[{"l":"?","t":"Termoclina — divide epilímnio oxigenado acima e hipolímnio anóxico abaixo","p":10,"e":"✅","tp":"c","fb":"Perfeito! A termoclina é a zona de transição abrupta. O epilímnio (topo, quente) é oxigenado pela fotossíntese. O hipolímnio (fundo, frio) fica anóxico — onde o metano é produzido."},{"l":"?","t":"Quimioclina — gradiente químico entre camadas de pH diferente na lagoa","p":0,"e":"❌","tp":"x","fb":"Quimioclina descreve gradientes químicos, mas o fenômeno aqui é a separação TÉRMICA. A termoclina é o termo correto para a transição de temperatura que separa as camadas."},{"l":"?","t":"Haloclina — diferença de salinidade entre água superficial e profunda","p":5,"e":"⚠️","tp":"w","fb":"Haloclina descreve gradiente de salinidade, não de temperatura. O correto aqui é termoclina — separação por temperatura que impede a mistura das camadas e cria anoxia embaixo."}]},{"n":4,"title":"A Floração Verde","sub":"Baía do Campo Queimado – 3º Dia","icon":"🦠","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"ge8f5\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#e8f5e9\"/><stop offset=\"100%\" stop-color=\"#1b5e20\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#ge8f5)\"/><rect y=\"105\" width=\"340\" height=\"65\" fill=\"#43a047\" opacity=\".6\"/><path d=\"M0,96 Q60,84 120,90 Q180,84 240,90 Q290,84 340,90 L340,108 L0,108Z\" fill=\"#a5d6a7\"/><line x1=\"60\" y1=\"105\" x2=\"60\" y2=\"18\" stroke=\"#5d4037\" stroke-width=\"5\"/><ellipse cx=\"60\" cy=\"16\" rx=\"24\" ry=\"11\" fill=\"#1b5e20\"/><ellipse cx=\"60\" cy=\"9\" rx=\"18\" ry=\"8\" fill=\"#2e7d32\"/><line x1=\"160\" y1=\"105\" x2=\"158\" y2=\"28\" stroke=\"#4e342e\" stroke-width=\"4\"/><ellipse cx=\"158\" cy=\"26\" rx=\"20\" ry=\"9\" fill=\"#33691e\"/><line x1=\"270\" y1=\"105\" x2=\"268\" y2=\"22\" stroke=\"#5d4037\" stroke-width=\"5\"/><ellipse cx=\"268\" cy=\"20\" rx=\"22\" ry=\"10\" fill=\"#1b5e20\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">CIANOBACTÉRIAS</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Fósforo: 0.28 mg/L</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Anomalia: 4× acima do normal</text></svg>","nar":"Terceiro dia: a lagoa amanheceu verde-azulada. Cheiro forte de terra molhada. O sensor detecta fósforo total de 0,28 mg/L — quatro vezes acima do normal. O que está acontecendo?","q":"O que causou a coloração verde e o odor intenso da lagoa no 3º dia?","cs":[{"l":"?","t":"Cinzas liberaram fósforo, causando eutrofização e floração de cianobactérias tóxicas","p":10,"e":"✅","tp":"c","fb":"Excelente! As cinzas são ricas em fósforo e potássio. Na água, fertilizam cianobactérias explosivamente — eutrofização! Produzem cianotoxinas perigosas para peixes, bovinos e abastecimento humano."},{"l":"?","t":"Crescimento natural de alga verde estimulado pela alta temperatura da água","p":0,"e":"❌","tp":"x","fb":"A coloração verde-azulada, o cheiro e o fósforo 4× acima do normal indicam cianobactérias (bactérias, não algas), desencadeadas pelo fósforo das cinzas. Não é fenômeno natural comum."},{"l":"?","t":"Suspensão de sedimentos argilosos pela chuva forte que ocorreu durante a noite","p":0,"e":"❌","tp":"x","fb":"Argila e barro geram coloração marrom-turva, não verde-azulada intensa. A cor viva, o odor e o fósforo elevado confirmam floração de cianobactérias por eutrofização pós-queimada."}]},{"n":5,"title":"O Metano Invisível","sub":"Câmara Flutuante – 14h00","icon":"⚗️","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"gf3e5\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#f3e5f5\"/><stop offset=\"100%\" stop-color=\"#4a148c\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#gf3e5)\"/><rect y=\"98\" width=\"340\" height=\"72\" fill=\"#0277bd\" opacity=\".78\"/><line x1=\"0\" y1=\"112\" x2=\"340\" y2=\"112\" stroke=\"rgba(255,255,255,.3)\" stroke-width=\"1.5\"/><line x1=\"30\" y1=\"130\" x2=\"120\" y2=\"130\" stroke=\"rgba(255,255,255,.22)\" stroke-width=\"1\"/><line x1=\"200\" y1=\"140\" x2=\"310\" y2=\"140\" stroke=\"rgba(255,255,255,.22)\" stroke-width=\"1\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">CÂMARA FLUTUANTE</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">CH₄: 45 mmol/m²/dia</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">CO₂: 12 mmol/m²/dia</text></svg>","nar":"Uma câmara flutuante sobre a lagoa registra fluxo de CH₄ de 45 mmol/m²/dia — muito acima da média. Bolhas sobem do sedimento escuro. Por que essa lagoa emite tanto metano?","q":"Qual processo explica a produção intensa de metano no sedimento da lagoa?","cs":[{"l":"?","t":"Metanogênese anaeróbia por archaea que decompõem matéria orgânica sem oxigênio","p":10,"e":"✅","tp":"c","fb":"Perfeito! Em sedimentos anóxicos, archaea metanogênicas decompõem matéria orgânica e liberam CH₄. As cinzas aumentaram o aporte orgânico, intensificando o processo. Lagoas rasas pantaneiras são fontes significativas de metano."},{"l":"?","t":"Pressão do sedimento compactado que libera gás natural das camadas rochosas","p":0,"e":"❌","tp":"x","fb":"O CH₄ vem da atividade microbiana no sedimento, não de gás natural geológico. Archaea metanogênicas são os principais produtores em ambientes aquáticos anóxicos rasos."},{"l":"?","t":"Fotólise da água pelo sol intenso que quebra moléculas e gera metano livre","p":0,"e":"❌","tp":"x","fb":"A fotólise da água produz O₂ e H₂, não CH₄. A metanogênese anaeróbia no sedimento anóxico é a fonte dominante de metano nas lagoas pantaneiras impactadas por cinzas."}]},{"n":6,"title":"A Queimada Avança","sub":"Frente de Fogo – 3ª Semana","icon":"🔥","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"g4242\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#424242\"/><stop offset=\"100%\" stop-color=\"#ff6f00\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#g4242)\"/><path d=\"M0,95 Q30,70 55,80 Q80,56 110,72 Q140,46 165,62 Q188,42 210,60 Q235,48 260,66 Q288,54 312,74 L340,80 L340,130 L0,130Z\" fill=\"#e65100\"/><circle cx=\"80\" cy=\"50\" r=\"18\" fill=\"#ff9800\" opacity=\".7\"/><circle cx=\"200\" cy=\"42\" r=\"20\" fill=\"#ff6d00\" opacity=\".65\"/><line x1=\"100\" y1=\"0\" x2=\"82\" y2=\"130\" stroke=\"rgba(80,80,80,.4)\" stroke-width=\"8\"/><line x1=\"200\" y1=\"0\" x2=\"185\" y2=\"130\" stroke=\"rgba(80,80,80,.35)\" stroke-width=\"11\"/><rect y=\"130\" width=\"340\" height=\"40\" fill=\"#795548\" opacity=\".6\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">NOVA QUEIMADA</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Cinzas chegando à lagoa</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Previsão: ↑ pH ↑ P ↑ CH₄</text></svg>","nar":"Nova frente de fogo avança. Dois dias depois toneladas de cinzas chegam à lagoa. Você refaz todas as medições. Quais mudanças químicas são mais prováveis de detectar primeiro?","q":"O que você espera medir após o novo aporte massivo de cinzas na lagoa?","cs":[{"l":"?","t":"Elevação do pH e do fósforo com nova floração de cianobactérias emergindo","p":10,"e":"✅","tp":"c","fb":"Exatamente! Cinzas são alcalinas e ricas em nutrientes. O pH sobe, o fósforo dispara e nova eutrofização se instala em dias. Estudos no Pantanal registram aumento de 200–400% no fósforo após queimadas próximas."},{"l":"?","t":"Queda do pH e do carbono orgânico, com maior oxigenação da coluna de água","p":0,"e":"❌","tp":"x","fb":"As cinzas fazem o oposto: ELEVAM o pH (são alcalinas) e AUMENTAM os nutrientes. A oxigenação piora com a floração de cianobactérias que se instala rapidamente após o aporte."},{"l":"?","t":"Estabilidade química total, pois as lagoas tamponam bem aportes externos de nutrientes","p":0,"e":"❌","tp":"x","fb":"Lagoas rasas e fechadas do Pantanal têm baixa capacidade tampão. O efeito das cinzas é amplificado exatamente pela ausência de diluição que um rio teria."}]},{"n":7,"title":"A Cheia Chega","sub":"Planície Alagável – Estação Chuvosa","icon":"🌊","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"gbbde\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#bbdefb\"/><stop offset=\"100%\" stop-color=\"#0277bd\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#gbbde)\"/><rect y=\"98\" width=\"340\" height=\"72\" fill=\"#0277bd\" opacity=\".78\"/><line x1=\"0\" y1=\"112\" x2=\"340\" y2=\"112\" stroke=\"rgba(255,255,255,.3)\" stroke-width=\"1.5\"/><line x1=\"30\" y1=\"130\" x2=\"120\" y2=\"130\" stroke=\"rgba(255,255,255,.22)\" stroke-width=\"1\"/><line x1=\"200\" y1=\"140\" x2=\"310\" y2=\"140\" stroke=\"rgba(255,255,255,.22)\" stroke-width=\"1\"/><line x1=\"40\" y1=\"98\" x2=\"40\" y2=\"30\" stroke=\"#33691e\" stroke-width=\"4\"/><ellipse cx=\"40\" cy=\"28\" rx=\"20\" ry=\"9\" fill=\"#2e7d32\"/><line x1=\"290\" y1=\"98\" x2=\"288\" y2=\"35\" stroke=\"#33691e\" stroke-width=\"3.5\"/><ellipse cx=\"288\" cy=\"33\" rx=\"18\" ry=\"8\" fill=\"#1b5e20\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">CARBONO ORGÂNICO</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">COD: 12 → 38 mg/L</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Pulso de inundação: Lixiviação ativa</text></svg>","nar":"O Rio Paraguai sobe 4 metros e inunda a planície. O carbono orgânico dissolvido (COD) saltou de 12 para 38 mg/L. Esse carbono veio de onde?","q":"O que explica o salto de COD de 12 para 38 mg/L durante a inundação?","cs":[{"l":"?","t":"Lixiviação de matéria orgânica do solo seco e decomposição da vegetação inundada","p":10,"e":"✅","tp":"c","fb":"Perfeito! Quando o solo seco é inundado, compostos orgânicos são liberados instantaneamente — lixiviação. É o \"pulso de inundação\" de Junk et al. (1989), motor central da produtividade pantaneira."},{"l":"?","t":"Fotossíntese intensa das algas que produzem e liberam carbono na coluna de água","p":0,"e":"❌","tp":"x","fb":"A fotossíntese consome CO₂ e produz biomassa, não eleva o COD diretamente. O aumento vem da lixiviação física e da decomposição do solo inundado, processos imediatos e dominantes."},{"l":"?","t":"Contaminação por efluentes urbanos de cidades distantes transportados pela cheia","p":5,"e":"⚠️","tp":"w","fb":"Contribuição urbana existe, mas é pequena nessa região. O COD pantaneiro tem assinatura isotópica de carbono terrestre local. A lixiviação da serapilheira e solo inundado é a fonte dominante."}]}]},
{"id":"fauna","icon":"🐊","title":"Fauna Pantaneira","sub":"Ecologia e comportamento animal","color":"#1565c0","diff":2,"phases":[{"n":1,"title":"Rastros na Lama","sub":"Margem do Corixo – Amanhecer","icon":"🐾","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"ga188\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#a1887f\"/><stop offset=\"100%\" stop-color=\"#3e2723\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#ga188)\"/><rect y=\"110\" width=\"340\" height=\"60\" fill=\"#8d6e63\" opacity=\".6\"/><path d=\"M0,100 Q80,88 170,96 Q255,88 340,96 L340,114 L0,114Z\" fill=\"#a5d6a7\" opacity=\".7\"/><rect x=\"220\" y=\"62\" width=\"50\" height=\"40\" rx=\"4\" fill=\"#8d6e63\"/><rect x=\"218\" y=\"50\" width=\"54\" height=\"16\" rx=\"3\" fill=\"#6d4c41\"/><rect x=\"238\" y=\"60\" width=\"8\" height=\"42\" rx=\"1\" fill=\"#5d4037\"/><path d=\"M180,105 Q200,96 240,100 Q260,103 280,100 L275,115 Q255,118 235,114 Q205,112 185,110Z\" fill=\"#4e342e\"/><circle cx=\"195\" cy=\"108\" r=\"4\" fill=\"#37474f\"/><circle cx=\"265\" cy=\"109\" r=\"4\" fill=\"#37474f\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">RASTRO B</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">4 dedos | 12 cm | sem garra</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Espécie: a identificar</text></svg>","nar":"Amanhecer na margem do corixo. A lama guarda rastros noturnos de três espécies. O rastro B tem 4 dedos, 12 cm de diâmetro e nenhuma marca de garra. Qual animal deixou essa pegada?","q":"Qual espécie produziu o rastro B — 4 dedos, 12 cm, sem marca de garra?","cs":[{"l":"?","t":"Anta (Tapirus terrestris), maior mamífero terrestre do Brasil, frequente em margens","p":10,"e":"✅","tp":"c","fb":"Correto! A anta tem patas tetradátilas na frente com pegadas arredondadas e grandes. Sem garras visíveis. Frequenta margens de rios e corixos regularmente para se refrescar."},{"l":"?","t":"Onça-pintada (Panthera onca), felino com rosetas e pegada circular arredondada","p":0,"e":"❌","tp":"x","fb":"A pegada de onça tem 7–9 cm (menor que 12 cm) e almofadas plantares distintas. O rastro B de 12 cm aponta claramente para anta, animal muito maior."},{"l":"?","t":"Capivara (Hydrochoerus hydrochaeris), roedor com pegada de 6 a 8 cm","p":5,"e":"⚠️","tp":"w","fb":"Capivara tem 4 dedos com palmação interdigital, mas pegadas menores (6–8 cm). O rastro B de 12 cm e 4 dedos sem palmação é característico de anta."}]},{"n":2,"title":"O Ninho do Tuiuiú","sub":"Cordilheira do Boi Preto – 8h00","icon":"🐦","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"ge8f5\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#e8f5e9\"/><stop offset=\"100%\" stop-color=\"#33691e\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#ge8f5)\"/><rect y=\"105\" width=\"340\" height=\"65\" fill=\"#43a047\" opacity=\".6\"/><path d=\"M0,96 Q60,84 120,90 Q180,84 240,90 Q290,84 340,90 L340,108 L0,108Z\" fill=\"#a5d6a7\"/><line x1=\"60\" y1=\"105\" x2=\"60\" y2=\"18\" stroke=\"#5d4037\" stroke-width=\"5\"/><ellipse cx=\"60\" cy=\"16\" rx=\"24\" ry=\"11\" fill=\"#1b5e20\"/><ellipse cx=\"60\" cy=\"9\" rx=\"18\" ry=\"8\" fill=\"#2e7d32\"/><line x1=\"160\" y1=\"105\" x2=\"158\" y2=\"28\" stroke=\"#4e342e\" stroke-width=\"4\"/><ellipse cx=\"158\" cy=\"26\" rx=\"20\" ry=\"9\" fill=\"#33691e\"/><line x1=\"270\" y1=\"105\" x2=\"268\" y2=\"22\" stroke=\"#5d4037\" stroke-width=\"5\"/><ellipse cx=\"268\" cy=\"20\" rx=\"22\" ry=\"10\" fill=\"#1b5e20\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">JABIRU MYCTERIA</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Ave símbolo do Pantanal</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Status: Nidificação ativa</text></svg>","nar":"No alto de uma árvore morta, um par de tuiuiús cuida de um ninho enorme de gravetos. São a ave símbolo do Pantanal, com pescoço vermelho e branco inconfundível. Por que nidificam tão alto?","q":"Por que o tuiuiú constrói seu ninho no topo das árvores mais altas?","cs":[{"l":"?","t":"Para proteger ovos e filhotes dos predadores terrestres e das inundações periódicas","p":10,"e":"✅","tp":"c","fb":"Exato! A altura protege de predadores terrestres (onças, animais do chão) e garante que o ninho não seja atingido pelas cheias anuais. O mesmo ninho pode ser reusado por anos."},{"l":"?","t":"Para captar mais radiação solar e manter os ovos aquecidos durante a incubação","p":0,"e":"❌","tp":"x","fb":"O aquecimento solar independe da altura — o sol aquece igualmente em qualquer nível. A razão estratégica é a proteção contra predadores e a segurança durante as inundações."},{"l":"?","t":"Para ter melhor campo visual e detectar peixes nas lagoas antes de voar","p":5,"e":"⚠️","tp":"w","fb":"A visão panorâmica ajuda na caça, mas não é a principal razão para nidificar em altura. A proteção contra predadores e inundações é a explicação ecológica mais robusta."}]},{"n":3,"title":"A Onça no Rio","sub":"Baía das Pedras – Tarde","icon":"🐆","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"ge8f5\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#e8f5e9\"/><stop offset=\"100%\" stop-color=\"#0097a7\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#ge8f5)\"/><rect y=\"98\" width=\"340\" height=\"72\" fill=\"#0277bd\" opacity=\".78\"/><line x1=\"0\" y1=\"112\" x2=\"340\" y2=\"112\" stroke=\"rgba(255,255,255,.3)\" stroke-width=\"1.5\"/><line x1=\"30\" y1=\"130\" x2=\"120\" y2=\"130\" stroke=\"rgba(255,255,255,.22)\" stroke-width=\"1\"/><line x1=\"200\" y1=\"140\" x2=\"310\" y2=\"140\" stroke=\"rgba(255,255,255,.22)\" stroke-width=\"1\"/><line x1=\"40\" y1=\"98\" x2=\"40\" y2=\"30\" stroke=\"#33691e\" stroke-width=\"4\"/><ellipse cx=\"40\" cy=\"28\" rx=\"20\" ry=\"9\" fill=\"#2e7d32\"/><line x1=\"290\" y1=\"98\" x2=\"288\" y2=\"35\" stroke=\"#33691e\" stroke-width=\"3.5\"/><ellipse cx=\"288\" cy=\"33\" rx=\"18\" ry=\"8\" fill=\"#1b5e20\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">PANTHERA ONCA</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Fêmea ~ 80 kg | Pantanal</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Maior pop.: do planeta</text></svg>","nar":"Uma onça-pintada fêmea pesca piranhas às margens de uma baía. Comportamento raramente documentado. O que distingue ecologicamente a onça-pintada pantaneira das demais populações?","q":"O que diferencia ecologicamente a onça-pintada do Pantanal das demais?","cs":[{"l":"?","t":"É maior e mais aquática, caçando peixes, jacarés e capivaras com alta frequência","p":10,"e":"✅","tp":"c","fb":"Correto! As onças do Pantanal são as maiores do mundo (machos até 120 kg). A abundância de recursos aquáticos seleciona indivíduos maiores. O Pantanal tem a maior densidade de onças do planeta!"},{"l":"?","t":"É menor e mais veloz, especializada em capturar aves e mamíferos pequenos","p":0,"e":"❌","tp":"x","fb":"Na verdade, a onça pantaneira é a MAIOR subpopulação. O ambiente aquático seleciona indivíduos maiores. Ela é generalista, não especialista em pequenas presas."},{"l":"?","t":"Vive exclusivamente nas matas densas sem frequentar campos ou áreas alagadas","p":0,"e":"❌","tp":"x","fb":"É exatamente o oposto! A onça pantaneira é excelente nadadora e frequenta regularmente campos, baías e margens de rios para caçar peixes, jacarés e capivaras."}]},{"n":4,"title":"A Piracema","sub":"Rio Paraguai – Novembro","icon":"🐟","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"ge3f2\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#e3f2fd\"/><stop offset=\"100%\" stop-color=\"#01579b\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#ge3f2)\"/><rect y=\"98\" width=\"340\" height=\"72\" fill=\"#0277bd\" opacity=\".78\"/><line x1=\"0\" y1=\"112\" x2=\"340\" y2=\"112\" stroke=\"rgba(255,255,255,.3)\" stroke-width=\"1.5\"/><line x1=\"30\" y1=\"130\" x2=\"120\" y2=\"130\" stroke=\"rgba(255,255,255,.22)\" stroke-width=\"1\"/><line x1=\"200\" y1=\"140\" x2=\"310\" y2=\"140\" stroke=\"rgba(255,255,255,.22)\" stroke-width=\"1\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">PIRACEMA ATIVA</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Dourado: migração 2.000 km</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Impacto: toda a cadeia trófica</text></svg>","nar":"Novembro: milhares de dourados saltam contra a correnteza. É a piracema. Pássaros, ariranhas e onças estão às margens. Qual é a importância ecológica e econômica desse fenômeno?","q":"O que representa ecologicamente a piracema para o Pantanal?","cs":[{"l":"?","t":"Migração reprodutiva que alimenta toda a cadeia trófica e sustenta a pesca local","p":10,"e":"✅","tp":"c","fb":"Perfeito! A piracema é o maior evento de concentração alimentar do Pantanal. Alimenta onças, ariranhas, tuiuiús e sustenta famílias ribeirinhas. Por isso o período tem restrição de pesca."},{"l":"?","t":"Mortandade sazonal de peixes por hipóxia nas lagoas que secaram no verão","p":0,"e":"❌","tp":"x","fb":"A piracema é migração reprodutiva ATIVA, não mortandade! Os peixes migram contra a correnteza para desovar em cabeceiras. É sinal de saúde do ecossistema, não de problema."},{"l":"?","t":"Competição territorial entre espécies por espaço nos rios durante a estiagem","p":0,"e":"❌","tp":"x","fb":"A piracema é cooperação reprodutiva sincronizada, não competição territorial. Diferentes espécies migram ao mesmo tempo estimuladas pela subida das águas, sem competição direta."}]},{"n":5,"title":"Capivara e Jacaré","sub":"Baía Funda – Entardecer","icon":"🐊","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"ge8f5\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#e8f5e9\"/><stop offset=\"100%\" stop-color=\"#006064\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#ge8f5)\"/><rect y=\"98\" width=\"340\" height=\"72\" fill=\"#0277bd\" opacity=\".78\"/><line x1=\"0\" y1=\"112\" x2=\"340\" y2=\"112\" stroke=\"rgba(255,255,255,.3)\" stroke-width=\"1.5\"/><line x1=\"30\" y1=\"130\" x2=\"120\" y2=\"130\" stroke=\"rgba(255,255,255,.22)\" stroke-width=\"1\"/><line x1=\"200\" y1=\"140\" x2=\"310\" y2=\"140\" stroke=\"rgba(255,255,255,.22)\" stroke-width=\"1\"/><line x1=\"40\" y1=\"98\" x2=\"40\" y2=\"30\" stroke=\"#33691e\" stroke-width=\"4\"/><ellipse cx=\"40\" cy=\"28\" rx=\"20\" ry=\"9\" fill=\"#2e7d32\"/><line x1=\"290\" y1=\"98\" x2=\"288\" y2=\"35\" stroke=\"#33691e\" stroke-width=\"3.5\"/><ellipse cx=\"288\" cy=\"33\" rx=\"18\" ry=\"8\" fill=\"#1b5e20\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">CONVIVÊNCIA</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Distância entre eles: 3m</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Comportamento: sem fuga observada</text></svg>","nar":"Capivaras pastam tranquilamente a 3 metros de jacarés que tomam sol. Sem fuga, sem pânico. Por que essa convivência aparente é possível?","q":"Por que capivaras e jacarés convivem tão próximos sem conflito evidente?","cs":[{"l":"?","t":"Jacarés preferem peixes como presa; atacam capivaras apenas oportunisticamente","p":10,"e":"✅","tp":"c","fb":"Correto! O jacaré-do-pantanal tem dieta com 60–70% de peixes. Capivaras adultas são presas de maior risco. A abundância de peixes fáceis reduz a pressão predatória sobre as capivaras."},{"l":"?","t":"Existe simbiose formal documentada em que capivaras limpam parasitas dos jacarés","p":5,"e":"⚠️","tp":"w","fb":"Hipótese interessante, mas sem evidências científicas sólidas. O que ocorre é tolerância mútua baseada na fartura de recursos e no cálculo de risco-benefício de cada ataque."},{"l":"?","t":"Capivaras adultas são grandes demais para qualquer jacaré conseguir atacar","p":0,"e":"❌","tp":"x","fb":"Jacarés grandes do Pantanal (acima de 2 m) são capazes de atacar capivaras adultas, especialmente na água. A razão é a disponibilidade de presas mais fáceis e menos arriscadas."}]},{"n":6,"title":"A Arara-Azul","sub":"Carandazal do Porto – Manhã","icon":"🦜","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"ge3f2\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#e3f2fd\"/><stop offset=\"100%\" stop-color=\"#0d47a1\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#ge3f2)\"/><rect y=\"105\" width=\"340\" height=\"65\" fill=\"#43a047\" opacity=\".6\"/><path d=\"M0,96 Q60,84 120,90 Q180,84 240,90 Q290,84 340,90 L340,108 L0,108Z\" fill=\"#a5d6a7\"/><line x1=\"60\" y1=\"105\" x2=\"60\" y2=\"18\" stroke=\"#5d4037\" stroke-width=\"5\"/><ellipse cx=\"60\" cy=\"16\" rx=\"24\" ry=\"11\" fill=\"#1b5e20\"/><ellipse cx=\"60\" cy=\"9\" rx=\"18\" ry=\"8\" fill=\"#2e7d32\"/><line x1=\"160\" y1=\"105\" x2=\"158\" y2=\"28\" stroke=\"#4e342e\" stroke-width=\"4\"/><ellipse cx=\"158\" cy=\"26\" rx=\"20\" ry=\"9\" fill=\"#33691e\"/><line x1=\"270\" y1=\"105\" x2=\"268\" y2=\"22\" stroke=\"#5d4037\" stroke-width=\"5\"/><ellipse cx=\"268\" cy=\"20\" rx=\"22\" ry=\"10\" fill=\"#1b5e20\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">ANODORHYNCHUS</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">HYACINTHINUS</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Status IUCN: Vulnerável</text></svg>","nar":"Uma arara-azul entra em um oco de manduvi para alimentar filhotes. É a maior arara do mundo, quase extinta nos anos 80. Por que ela depende especificamente do manduvi?","q":"Por que a arara-azul depende essencialmente da árvore manduvi para sobreviver?","cs":[{"l":"?","t":"Aninha quase exclusivamente em ocos de manduvi e come seus cocos duros","p":10,"e":"✅","tp":"c","fb":"Exato! 95% dos ninhos encontrados são em manduvi (Sterculia apetala). O bico poderoso quebra seus cocos. A conservação da arara-azul exige diretamente a proteção do manduvi."},{"l":"?","t":"O manduvi produz néctar que a arara consome e poliniza ao se alimentar","p":0,"e":"❌","tp":"x","fb":"A arara-azul não é polinizadora do manduvi via néctar. A relação é de nidificação nos ocos naturais e alimentação dos cocos — uma dependência estrutural, não de polinização."},{"l":"?","t":"A madeira do manduvi repele predadores, protegendo os ninhos de mamíferos","p":0,"e":"❌","tp":"x","fb":"Não é a madeira que protege, mas sim a altura e o formato do oco. A relação central é que o manduvi fornece ocos do tamanho certo E os cocos que a arara consome."}]},{"n":7,"title":"O Censo de Onças","sub":"Baía do Caracol – Fim de Tarde","icon":"🔭","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"ge8f5\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#e8f5e9\"/><stop offset=\"100%\" stop-color=\"#1b5e20\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#ge8f5)\"/><rect y=\"98\" width=\"340\" height=\"72\" fill=\"#0277bd\" opacity=\".78\"/><line x1=\"0\" y1=\"112\" x2=\"340\" y2=\"112\" stroke=\"rgba(255,255,255,.3)\" stroke-width=\"1.5\"/><line x1=\"30\" y1=\"130\" x2=\"120\" y2=\"130\" stroke=\"rgba(255,255,255,.22)\" stroke-width=\"1\"/><line x1=\"200\" y1=\"140\" x2=\"310\" y2=\"140\" stroke=\"rgba(255,255,255,.22)\" stroke-width=\"1\"/><line x1=\"40\" y1=\"98\" x2=\"40\" y2=\"30\" stroke=\"#33691e\" stroke-width=\"4\"/><ellipse cx=\"40\" cy=\"28\" rx=\"20\" ry=\"9\" fill=\"#2e7d32\"/><line x1=\"290\" y1=\"98\" x2=\"288\" y2=\"35\" stroke=\"#33691e\" stroke-width=\"3.5\"/><ellipse cx=\"288\" cy=\"33\" rx=\"18\" ry=\"8\" fill=\"#1b5e20\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">CENSO FAUNA</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Onças: ~4.000 no Pantanal</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Maior pop.: do mundo</text></svg>","nar":"Missão: estimar a população de onças-pintadas em 50 km² de Pantanal. Com recursos limitados, qual método identifica individualmente cada animal?","q":"Qual método identifica individualmente onças-pintadas em censos de campo?","cs":[{"l":"?","t":"Armadilhas fotográficas identificam cada onça pelo padrão único das rosetas","p":10,"e":"✅","tp":"c","fb":"Correto! Cada onça tem padrão de rosetas único, como impressão digital. Softwares de reconhecimento de padrão identificam cada indivíduo. É o método padrão mundial desde os anos 2000."},{"l":"?","t":"Sobrevoos de helicóptero permitem contagem visual direta de animais no campo","p":0,"e":"❌","tp":"x","fb":"Onças são crípticas e predominantemente crepusculares. A probabilidade de detecção aérea é abaixo de 5% dos indivíduos. Seria subestimação gravíssima da população real."},{"l":"?","t":"Contagem de rastros por quilômetro de margem fornece estimativas individualizadas","p":0,"e":"❌","tp":"x","fb":"Contagem de rastros dá índice de abundância relativa, não identifica indivíduos. Dois rastros da mesma onça seriam contados como dois animais diferentes."}]}]},
{"id":"pulso","icon":"🌊","title":"Pulso de Inundação","sub":"Hidrologia da planície alagável","color":"#0277bd","diff":2,"phases":[{"n":1,"title":"O Rio Sobe","sub":"Régua do Porto de Cáceres – Dezembro","icon":"📏","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"ge3f2\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#e3f2fd\"/><stop offset=\"100%\" stop-color=\"#01579b\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#ge3f2)\"/><rect y=\"98\" width=\"340\" height=\"72\" fill=\"#0277bd\" opacity=\".78\"/><line x1=\"0\" y1=\"112\" x2=\"340\" y2=\"112\" stroke=\"rgba(255,255,255,.3)\" stroke-width=\"1.5\"/><line x1=\"30\" y1=\"130\" x2=\"120\" y2=\"130\" stroke=\"rgba(255,255,255,.22)\" stroke-width=\"1\"/><line x1=\"200\" y1=\"140\" x2=\"310\" y2=\"140\" stroke=\"rgba(255,255,255,.22)\" stroke-width=\"1\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">NÍVEL ATUAL</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">3.2 m — subindo</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Previsão: 5–6 m em março</text></svg>","nar":"Dezembro em Cáceres. A régua do Porto mostra 3,2 metros e subindo. Chuvas acima da média na bacia do Alto Paraguai. Quando ocorre o pico da cheia e o que ele provoca?","q":"Quando ocorre o pico da cheia em Cáceres e qual seu efeito na planície?","cs":[{"l":"?","t":"Pico em fevereiro-março, inundando centenas de km² da planície pantaneira","p":10,"e":"✅","tp":"c","fb":"Correto! As chuvas de novembro-janeiro no Planalto chegam a Cáceres com 2–3 meses de atraso. O pico em fev-março ultrapassa 5 metros, inundando imensas planícies. É o pulso de inundação!"},{"l":"?","t":"Pico em junho-julho, quando a menor evaporação acumula água na planície","p":0,"e":"❌","tp":"x","fb":"Junho-julho é exatamente o período de SECA no Pantanal de Cáceres, não de cheia. O pico da cheia ocorre em fevereiro-março, com ondas vindas do Planalto de Mato Grosso."},{"l":"?","t":"Pico em outubro, com inundação rápida que dura apenas poucos dias seguidos","p":0,"e":"❌","tp":"x","fb":"Outubro marca o início das chuvas, não o pico. A inundação pantaneira é progressiva e dura semanas a meses — muito diferente de uma inundação súbita e passageira."}]},{"n":2,"title":"A Conectividade","sub":"Planície Inundada – Março","icon":"🔗","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"g80de\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#80deea\"/><stop offset=\"100%\" stop-color=\"#0097a7\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#g80de)\"/><rect y=\"98\" width=\"340\" height=\"72\" fill=\"#0277bd\" opacity=\".78\"/><line x1=\"0\" y1=\"112\" x2=\"340\" y2=\"112\" stroke=\"rgba(255,255,255,.3)\" stroke-width=\"1.5\"/><line x1=\"30\" y1=\"130\" x2=\"120\" y2=\"130\" stroke=\"rgba(255,255,255,.22)\" stroke-width=\"1\"/><line x1=\"200\" y1=\"140\" x2=\"310\" y2=\"140\" stroke=\"rgba(255,255,255,.22)\" stroke-width=\"1\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">CONECTIVIDADE</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Lagoas + Rio conectados</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Ictiofauna: troca de genes</text></svg>","nar":"A planície alaga. Lagoas antes isoladas conectam-se ao rio e entre si por lâminas rasas. Peixes migram entre ambientes. O que ocorre com a biodiversidade aquática durante esse período?","q":"O que a conectividade sazonal provoca na ictiofauna pantaneira?","cs":[{"l":"?","t":"Peixes migram entre ambientes, trocam genes e acessam novos recursos alimentares","p":10,"e":"✅","tp":"c","fb":"Perfeito! A conectividade é fundamental para a biodiversidade aquática. Peixes recolonizam lagoas, trocam material genético e acessam recursos alimentares novos. É a fase mais produtiva do ciclo!"},{"l":"?","t":"Peixes de lagoa morrem ao entrar em contato com a água corrente do rio","p":0,"e":"❌","tp":"x","fb":"A maioria dos peixes pantaneiros são eurioicos — adaptados a grande variação de condições. A conectividade é benéfica, não prejudicial. Estudos mostram deslocamentos de centenas de km."},{"l":"?","t":"Peixes permanecem no mesmo habitat pois a cheia não altera seu comportamento","p":0,"e":"❌","tp":"x","fb":"Pelo contrário! A cheia é o principal gatilho para a movimentação dos peixes. A telemetria confirma deslocamentos de dezenas a centenas de quilômetros durante a conectividade."}]},{"n":3,"title":"A Cordilheira","sub":"Fazenda São Domingos – Cheia","icon":"⛰️","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"ge0f7\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#e0f7fa\"/><stop offset=\"100%\" stop-color=\"#00695c\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#ge0f7)\"/><rect y=\"98\" width=\"340\" height=\"72\" fill=\"#0277bd\" opacity=\".78\"/><line x1=\"0\" y1=\"112\" x2=\"340\" y2=\"112\" stroke=\"rgba(255,255,255,.3)\" stroke-width=\"1.5\"/><line x1=\"30\" y1=\"130\" x2=\"120\" y2=\"130\" stroke=\"rgba(255,255,255,.22)\" stroke-width=\"1\"/><line x1=\"200\" y1=\"140\" x2=\"310\" y2=\"140\" stroke=\"rgba(255,255,255,.22)\" stroke-width=\"1\"/><line x1=\"40\" y1=\"98\" x2=\"40\" y2=\"30\" stroke=\"#33691e\" stroke-width=\"4\"/><ellipse cx=\"40\" cy=\"28\" rx=\"20\" ry=\"9\" fill=\"#2e7d32\"/><line x1=\"290\" y1=\"98\" x2=\"288\" y2=\"35\" stroke=\"#33691e\" stroke-width=\"3.5\"/><ellipse cx=\"288\" cy=\"33\" rx=\"18\" ry=\"8\" fill=\"#1b5e20\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">CORDILHEIRA</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">0.5 m acima da planície</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Fauna refugiada: cervos, capivaras, aves</text></svg>","nar":"A planície está inundada. No meio da lâmina de água, uma faixa elevada (cordilheira) permanece seca. Capivaras, cervos e tuiuiús se concentram ali. Qual é a função ecológica desse elemento?","q":"Qual função ecológica exercem as cordilheiras durante o período de inundação?","cs":[{"l":"?","t":"São refúgios terrestres que garantem alimentação e reprodução da fauna durante a cheia","p":11,"e":"✅","tp":"c","fb":"Exato! As cordilheiras são fundamentais. Elevações de 0,5 a 2 m acima da planície, servem de berçário para cervo, capivara, ema e dezenas de aves. Sua preservação é crítica."},{"l":"?","t":"São locais de pesca mais produtivos, concentrando os peixes que fogem da corrente","p":0,"e":"❌","tp":"x","fb":"As cordilheiras são áreas terrestres — os peixes se concentram nas baías e corixos. As cordilheiras servem como refúgio terrestre, não aquático, durante as cheias."},{"l":"?","t":"Regulam a temperatura da água nas lagoas próximas, evitando a estratificação térmica","p":0,"e":"❌","tp":"x","fb":"Cordilheiras são ilhas de vegetação terrestre, não reguladoras térmicas de lagoas. Sua função é ser refúgio físico para animais terrestres durante o alagamento da planície."}]},{"n":4,"title":"Floresta Inundada","sub":"Mata Ciliar do Corixo – Cheia","icon":"🌳","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"ge8f5\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#e8f5e9\"/><stop offset=\"100%\" stop-color=\"#01579b\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#ge8f5)\"/><rect y=\"98\" width=\"340\" height=\"72\" fill=\"#0277bd\" opacity=\".78\"/><line x1=\"0\" y1=\"112\" x2=\"340\" y2=\"112\" stroke=\"rgba(255,255,255,.3)\" stroke-width=\"1.5\"/><line x1=\"30\" y1=\"130\" x2=\"120\" y2=\"130\" stroke=\"rgba(255,255,255,.22)\" stroke-width=\"1\"/><line x1=\"200\" y1=\"140\" x2=\"310\" y2=\"140\" stroke=\"rgba(255,255,255,.22)\" stroke-width=\"1\"/><line x1=\"40\" y1=\"98\" x2=\"40\" y2=\"30\" stroke=\"#33691e\" stroke-width=\"4\"/><ellipse cx=\"40\" cy=\"28\" rx=\"20\" ry=\"9\" fill=\"#2e7d32\"/><line x1=\"290\" y1=\"98\" x2=\"288\" y2=\"35\" stroke=\"#33691e\" stroke-width=\"3.5\"/><ellipse cx=\"288\" cy=\"33\" rx=\"18\" ry=\"8\" fill=\"#1b5e20\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">GEE EMITIDOS</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">CH₄ e CO₂ acima da média</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Sedimento: anóxico ativo</text></svg>","nar":"A mata ciliar está submersa. Bolhas sobem do sedimento escuro. Medições mostram CH₄ e CO₂ muito elevados. Por que a floresta inundada emite tantos gases de efeito estufa?","q":"Por que florestas inundadas emitem grandes quantidades de CH₄ e CO₂?","cs":[{"l":"?","t":"Decomposição anaeróbia do solo e serapilheira submersos produz CH₄ em sedimentos","p":10,"e":"✅","tp":"c","fb":"Correto! Quando o solo e a serapilheira ficam submersos sem oxigênio, archaea metanogênicas e bactérias fermentadoras produzem CH₄ e CO₂ intensamente. O Pantanal é fonte natural de GEE."},{"l":"?","t":"Fotossíntese reduzida sob a água acumula CO₂ que é gradualmente liberado","p":5,"e":"⚠️","tp":"w","fb":"A fotossíntese subaquática de fato se reduz, mas não é a fonte dominante de GEE. A decomposição anaeróbia do sedimento inundado domina amplamente o balanço de carbono."},{"l":"?","t":"Expansão térmica da água quente que expulsa gases dissolvidos para a superfície","p":0,"e":"❌","tp":"x","fb":"A expansão térmica é um fenômeno físico menor. O processo dominante é biológico: a metanogênese por archaea e a fermentação bacteriana no sedimento anóxico alagado."}]},{"n":5,"title":"A Seca Concentra","sub":"Baía Seca – Julho","icon":"☀️","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"gfff8\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#fff8e1\"/><stop offset=\"100%\" stop-color=\"#bf360c\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#gfff8)\"/><rect y=\"110\" width=\"340\" height=\"60\" fill=\"#8d6e63\" opacity=\".6\"/><path d=\"M0,100 Q80,88 170,96 Q255,88 340,96 L340,114 L0,114Z\" fill=\"#a5d6a7\" opacity=\".7\"/><rect x=\"220\" y=\"62\" width=\"50\" height=\"40\" rx=\"4\" fill=\"#8d6e63\"/><rect x=\"218\" y=\"50\" width=\"54\" height=\"16\" rx=\"3\" fill=\"#6d4c41\"/><rect x=\"238\" y=\"60\" width=\"8\" height=\"42\" rx=\"1\" fill=\"#5d4037\"/><path d=\"M180,105 Q200,96 240,100 Q260,103 280,100 L275,115 Q255,118 235,114 Q205,112 185,110Z\" fill=\"#4e342e\"/><circle cx=\"195\" cy=\"108\" r=\"4\" fill=\"#37474f\"/><circle cx=\"265\" cy=\"109\" r=\"4\" fill=\"#37474f\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">SECA ATIVA</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">80% da baía seca</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Fauna: concentração máxima</text></svg>","nar":"Julho. A baía secou mais de 80%, restando uma poça. Centenas de peixes se concentram. Jacarés e garças festejam às margens. Qual é o papel ecológico dessa concentração?","q":"O que representa a concentração de peixes nos poços residuais da seca?","cs":[{"l":"?","t":"Pulso reverso que alimenta toda a cadeia trófica de aves, jacarés e mamíferos","p":10,"e":"✅","tp":"c","fb":"Exatamente! A seca é tão importante quanto a cheia. A concentração de peixes em poços residuais alimenta garças, marrecos, jacarés, ariranhas e lontra. É o pulso reverso de produtividade."},{"l":"?","t":"Evento negativo de degradação que deve ser monitorado pelos órgãos ambientais","p":0,"e":"❌","tp":"x","fb":"A seca pantaneira é natural e historicamente recorrente — não é degradação! O sistema evoluiu com esse pulso seca-cheia. A concentração de peixes é uma funcionalidade essencial."},{"l":"?","t":"Oportunidade de engorda rápida pois os peixes competem menos por alimento","p":0,"e":"❌","tp":"x","fb":"Na seca, os peixes sofrem estresse — oxigênio cai, competição aumenta. O benefício ecológico está nos predadores que se alimentam deles, não nos próprios peixes concentrados."}]},{"n":6,"title":"O Pulso de Junk","sub":"Margem do Rio – Campo Limpo","icon":"📈","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"ge3f2\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#e3f2fd\"/><stop offset=\"100%\" stop-color=\"#0277bd\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#ge3f2)\"/><rect y=\"98\" width=\"340\" height=\"72\" fill=\"#0277bd\" opacity=\".78\"/><line x1=\"0\" y1=\"112\" x2=\"340\" y2=\"112\" stroke=\"rgba(255,255,255,.3)\" stroke-width=\"1.5\"/><line x1=\"30\" y1=\"130\" x2=\"120\" y2=\"130\" stroke=\"rgba(255,255,255,.22)\" stroke-width=\"1\"/><line x1=\"200\" y1=\"140\" x2=\"310\" y2=\"140\" stroke=\"rgba(255,255,255,.22)\" stroke-width=\"1\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">PULSO DE INUNDAÇÃO</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Junk, Bayley & Sparks 1989</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Motor de: produtividade e diversidade</text></svg>","nar":"O Flood Pulse Concept de Junk, Bayley e Sparks (1989) é considerado o maior avanço no estudo de planícies alagáveis. O que essa teoria postula?","q":"O que postula o Flood Pulse Concept de Junk et al. (1989)?","cs":[{"l":"?","t":"O ciclo cheia-seca é o principal motor de produtividade em planícies alagáveis","p":10,"e":"✅","tp":"c","fb":"Exatamente! Junk et al. propõem que o pulso de inundação — não o gradiente rio-planície — estrutura as comunidades e move o fluxo de energia. O Pantanal é exemplo clássico dessa teoria!"},{"l":"?","t":"As inundações destroem o ecossistema e a fauna se recupera apenas na estiagem","p":0,"e":"❌","tp":"x","fb":"O oposto! A inundação não é perturbação — é o motor. A cheia ativa lixiviação de nutrientes, migração de peixes e produção primária. Ambas as fases são complementares."},{"l":"?","t":"Somente os peixes respondem ao pulso; outros organismos são insensíveis às cheias","p":0,"e":"❌","tp":"x","fb":"O Flood Pulse Concept afeta TODOS os componentes bióticos: peixes, anfíbios, répteis, aves, mamíferos, plantas e microbiota. É uma teoria de ecossistema, não apenas de ictiologia."}]},{"n":7,"title":"Seca Histórica","sub":"Análise de Dados – Cáceres-MT","icon":"📉","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"ge3f2\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#e3f2fd\"/><stop offset=\"100%\" stop-color=\"#c62828\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#ge3f2)\"/><rect y=\"98\" width=\"340\" height=\"72\" fill=\"#0277bd\" opacity=\".78\"/><line x1=\"0\" y1=\"112\" x2=\"340\" y2=\"112\" stroke=\"rgba(255,255,255,.3)\" stroke-width=\"1.5\"/><line x1=\"30\" y1=\"130\" x2=\"120\" y2=\"130\" stroke=\"rgba(255,255,255,.22)\" stroke-width=\"1\"/><line x1=\"200\" y1=\"140\" x2=\"310\" y2=\"140\" stroke=\"rgba(255,255,255,.22)\" stroke-width=\"1\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">MÍNIMOS HISTÓRICOS</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">1966: 2.5m | 2023: 0.3m</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Tendência: −0.8 m / década</text></svg>","nar":"Dados do Rio Paraguai em Cáceres mostram queda nos níveis mínimos anuais desde os anos 1970. A seca extrema de 2019-2024 bateu recordes. Qual é a explicação mais completa?","q":"O que melhor explica a queda dos níveis mínimos do Rio Paraguai em Cáceres?","cs":[{"l":"?","t":"Desmatamento no Planalto, consumo crescente de água e mudanças climáticas combinados","p":10,"e":"✅","tp":"c","fb":"Correto! A explicação é multifatorial. Desmatamento reduz a recarga hídrica. Expansão agropecuária aumenta o consumo. Mudanças climáticas agravam o déficit. A queda dos mínimos é alarme real."},{"l":"?","t":"Variabilidade climática natural cíclica sem influência significativa de fatores humanos","p":5,"e":"⚠️","tp":"w","fb":"Ciclos naturais existem, mas a magnitude e persistência da queda desde os anos 70 supera a variabilidade histórica. A tendência negativa estatística indica fatores antrópicos sobrepostos."},{"l":"?","t":"Construção de barragens no Rio Paraguai que retêm e desviam o fluxo hídrico","p":0,"e":"❌","tp":"x","fb":"O Rio Paraguai no trecho de Cáceres não tem grandes barragens. A queda dos mínimos está mais ligada ao desmatamento do Planalto e ao aumento do consumo de água para irrigação."}]}]},
{"id":"fogo","icon":"🔥","title":"Ecologia do Fogo","sub":"Queimadas, solo e biodiversidade","color":"#bf360c","diff":3,"phases":[{"n":1,"title":"O Fogo no Ecossistema","sub":"Campo Limpo – Pantanal Central","icon":"🔥","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"g4242\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#424242\"/><stop offset=\"100%\" stop-color=\"#ff6f00\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#g4242)\"/><path d=\"M0,95 Q30,70 55,80 Q80,56 110,72 Q140,46 165,62 Q188,42 210,60 Q235,48 260,66 Q288,54 312,74 L340,80 L340,130 L0,130Z\" fill=\"#e65100\"/><circle cx=\"80\" cy=\"50\" r=\"18\" fill=\"#ff9800\" opacity=\".7\"/><circle cx=\"200\" cy=\"42\" r=\"20\" fill=\"#ff6d00\" opacity=\".65\"/><line x1=\"100\" y1=\"0\" x2=\"82\" y2=\"130\" stroke=\"rgba(80,80,80,.4)\" stroke-width=\"8\"/><line x1=\"200\" y1=\"0\" x2=\"185\" y2=\"130\" stroke=\"rgba(80,80,80,.35)\" stroke-width=\"11\"/><rect y=\"130\" width=\"340\" height=\"40\" fill=\"#795548\" opacity=\".6\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">FOGO NATURAL</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Raios ou antrópico?</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Papel: ecológico</text></svg>","nar":"Uma frente de fogo avança pelo campo. O guia pantaneiro explica que o fogo é antigo companheiro do Pantanal. Mas qual é de fato seu papel ecológico em condições naturais?","q":"Qual é o papel ecológico do fogo no Pantanal em condições naturais?","cs":[{"l":"?","t":"Agente natural de reciclagem de nutrientes, renovação vegetal e mosaico de habitats","p":10,"e":"✅","tp":"c","fb":"Correto! O fogo recicla nutrientes das plantas mortas, renova a vegetação e cria mosaico de habitats em diferentes estágios de regeneração. Essa heterogeneidade sustenta alta biodiversidade."},{"l":"?","t":"Perturbação destrutiva que elimina espécies e degrada permanentemente os solos","p":0,"e":"❌","tp":"x","fb":"No Pantanal, o fogo moderado é um processo ecológico natural. A vegetação adaptada regenera rapidamente. A degradação permanente ocorre com fogo excessivo e frequente, não com o regime natural."},{"l":"?","t":"Fenômeno exclusivamente humano sem qualquer função no ecossistema natural","p":0,"e":"❌","tp":"x","fb":"Falácia comum! Raios causam incêndios naturais no Pantanal há milhares de anos. A flora e fauna evoluíram com o fogo, que tem papel ecológico bem documentado no ecossistema."}]},{"n":2,"title":"Tipos de Queimada","sub":"Estrada da Fazenda – Análise","icon":"🌫️","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"g3747\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#37474f\"/><stop offset=\"100%\" stop-color=\"#ff8f00\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#g3747)\"/><path d=\"M0,95 Q30,70 55,80 Q80,56 110,72 Q140,46 165,62 Q188,42 210,60 Q235,48 260,66 Q288,54 312,74 L340,80 L340,130 L0,130Z\" fill=\"#e65100\"/><circle cx=\"80\" cy=\"50\" r=\"18\" fill=\"#ff9800\" opacity=\".7\"/><circle cx=\"200\" cy=\"42\" r=\"20\" fill=\"#ff6d00\" opacity=\".65\"/><line x1=\"100\" y1=\"0\" x2=\"82\" y2=\"130\" stroke=\"rgba(80,80,80,.4)\" stroke-width=\"8\"/><line x1=\"200\" y1=\"0\" x2=\"185\" y2=\"130\" stroke=\"rgba(80,80,80,.35)\" stroke-width=\"11\"/><rect y=\"130\" width=\"340\" height=\"40\" fill=\"#795548\" opacity=\".6\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">TIPOS DE FOGO</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Natural: raios | Antrópico: humanos</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Intensidade: varia por estação</text></svg>","nar":"Você analisa dois registros de incêndio. Um iniciou com raios na seca. Outro foi ateado deliberadamente. O que diferencia esses dois tipos de queimada do ponto de vista ecológico?","q":"O que diferencia ecologicamente o fogo de raios do fogo antrópico no Pantanal?","cs":[{"l":"?","t":"O fogo de raios é sazonal e localmente disperso; o antrópico é deliberado e mais extenso","p":10,"e":"✅","tp":"c","fb":"Correto! Raios causam focos localizados na seca, em padrão com o qual a biota evoluiu. O fogo antrópico é mais extenso, frequente e pode ocorrer fora da época adequada, causando mais impacto."},{"l":"?","t":"O fogo de raios queima somente gramíneas; o antrópico destrói toda a vegetação","p":0,"e":"❌","tp":"x","fb":"Ambos os tipos de fogo podem queimar diferentes estratos dependendo da intensidade. A principal diferença não é o que queimam, mas a origem, escala, frequência e timing de cada um."},{"l":"?","t":"O fogo de raios só ocorre na cheia; o antrópico acontece somente na estação seca","p":0,"e":"❌","tp":"x","fb":"Na verdade é o contrário: raios causam incêndios principalmente na seca, quando a vegetação está seca. O fogo antrópico pode ocorrer em qualquer época, inclusive de forma inapropriada."}]},{"n":3,"title":"Cinzas e Solo","sub":"Área Queimada – 72h depois","icon":"🌱","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"g7955\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#795548\"/><stop offset=\"100%\" stop-color=\"#ff8f00\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#g7955)\"/><path d=\"M0,95 Q30,70 55,80 Q80,56 110,72 Q140,46 165,62 Q188,42 210,60 Q235,48 260,66 Q288,54 312,74 L340,80 L340,130 L0,130Z\" fill=\"#e65100\"/><circle cx=\"80\" cy=\"50\" r=\"18\" fill=\"#ff9800\" opacity=\".7\"/><circle cx=\"200\" cy=\"42\" r=\"20\" fill=\"#ff6d00\" opacity=\".65\"/><line x1=\"100\" y1=\"0\" x2=\"82\" y2=\"130\" stroke=\"rgba(80,80,80,.4)\" stroke-width=\"8\"/><line x1=\"200\" y1=\"0\" x2=\"185\" y2=\"130\" stroke=\"rgba(80,80,80,.35)\" stroke-width=\"11\"/><rect y=\"130\" width=\"340\" height=\"40\" fill=\"#795548\" opacity=\".6\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">SOLO PÓS-FOGO</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">pH antes: 6.2 | depois: 7.4</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Fósforo: ↑ 280% disponível</text></svg>","nar":"72 horas após a queimada. O solo está coberto de cinzas. Você coleta amostras para análise. Qual é o principal efeito químico imediato das cinzas sobre o solo pantaneiro?","q":"Qual é o principal efeito imediato das cinzas sobre a química do solo?","cs":[{"l":"?","t":"Elevam o pH e liberam fósforo e potássio para absorção imediata pelas plantas","p":10,"e":"✅","tp":"c","fb":"Correto! Cinzas são alcalinas (carbonato de cálcio e potássio) e ricas em fósforo. Elevam o pH do solo e disponibilizam nutrientes rapidamente. Por isso a vegetação rebrota tão rápido!"},{"l":"?","t":"Reduzem o pH e destroem microrganismos essenciais à ciclagem de nutrientes","p":0,"e":"❌","tp":"x","fb":"As cinzas ELEVAM o pH (são alcalinas, não ácidas). Alguns microrganismos são eliminados pelo calor, mas a recolonização microbiana é rápida e estimulada pelo aporte de nutrientes das cinzas."},{"l":"?","t":"Impermeabilizam o solo e bloqueiam a infiltração das primeiras chuvas seguintes","p":0,"e":"❌","tp":"x","fb":"Cinzas não impermeabilizam o solo de forma significativa. A crosta formada é superficial e transitória. O efeito químico (pH e nutrientes) é muito mais relevante ecologicamente."}]},{"n":4,"title":"Fauna e Fogo","sub":"Frente de Queimada – Documentação","icon":"🦌","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"g4242\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#424242\"/><stop offset=\"100%\" stop-color=\"#bf360c\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#g4242)\"/><path d=\"M0,95 Q30,70 55,80 Q80,56 110,72 Q140,46 165,62 Q188,42 210,60 Q235,48 260,66 Q288,54 312,74 L340,80 L340,130 L0,130Z\" fill=\"#e65100\"/><circle cx=\"80\" cy=\"50\" r=\"18\" fill=\"#ff9800\" opacity=\".7\"/><circle cx=\"200\" cy=\"42\" r=\"20\" fill=\"#ff6d00\" opacity=\".65\"/><line x1=\"100\" y1=\"0\" x2=\"82\" y2=\"130\" stroke=\"rgba(80,80,80,.4)\" stroke-width=\"8\"/><line x1=\"200\" y1=\"0\" x2=\"185\" y2=\"130\" stroke=\"rgba(80,80,80,.35)\" stroke-width=\"11\"/><rect y=\"130\" width=\"340\" height=\"40\" fill=\"#795548\" opacity=\".6\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">COMPORTAMENTO</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Fauna durante queimada ativa</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Estratégia: fuga ou permanência?</text></svg>","nar":"Uma queimada avança. Você documenta o comportamento de cervos, capivaras e aves. Como a maioria da fauna reagiu à frente de fogo ativa?","q":"Como a maioria da fauna pantaneira reage durante uma queimada ativa?","cs":[{"l":"?","t":"Migra para áreas úmidas e bordas não queimadas, sobrevivendo e retornando depois","p":10,"e":"✅","tp":"c","fb":"Correto! A maioria foge preventivamente para áreas úmidas e bordas. Aves aproveitam o fogo para caçar insetos que fogem. A fauna retorna rapidamente após a passagem das chamas."},{"l":"?","t":"Permanece imóvel esperando o fogo passar, protegida por comportamento instintivo","p":0,"e":"❌","tp":"x","fb":"Apenas algumas espécies muito adaptadas ficam imóveis. A estratégia dominante é a fuga para áreas seguras — úmidas, baías e bordas florestais que funcionam como refúgio."},{"l":"?","t":"Morre em grande parte, sendo as queimadas o evento mais letal ao Pantanal","p":0,"e":"❌","tp":"x","fb":"Queimadas moderadas causam mortalidade localizada, não extinção em massa. O Pantanal evoluiu com o fogo. A fauna é altamente móvel e maioria sobrevive migrando para áreas seguras."}]},{"n":5,"title":"Recuperação Pós-Fogo","sub":"Área Queimada – 3 Semanas","icon":"🌿","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"g5d40\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#5d4037\"/><stop offset=\"100%\" stop-color=\"#2e7d32\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#g5d40)\"/><rect y=\"105\" width=\"340\" height=\"65\" fill=\"#43a047\" opacity=\".6\"/><path d=\"M0,96 Q60,84 120,90 Q180,84 240,90 Q290,84 340,90 L340,108 L0,108Z\" fill=\"#a5d6a7\"/><line x1=\"60\" y1=\"105\" x2=\"60\" y2=\"18\" stroke=\"#5d4037\" stroke-width=\"5\"/><ellipse cx=\"60\" cy=\"16\" rx=\"24\" ry=\"11\" fill=\"#1b5e20\"/><ellipse cx=\"60\" cy=\"9\" rx=\"18\" ry=\"8\" fill=\"#2e7d32\"/><line x1=\"160\" y1=\"105\" x2=\"158\" y2=\"28\" stroke=\"#4e342e\" stroke-width=\"4\"/><ellipse cx=\"158\" cy=\"26\" rx=\"20\" ry=\"9\" fill=\"#33691e\"/><line x1=\"270\" y1=\"105\" x2=\"268\" y2=\"22\" stroke=\"#5d4037\" stroke-width=\"5\"/><ellipse cx=\"268\" cy=\"20\" rx=\"22\" ry=\"10\" fill=\"#1b5e20\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">RECUPERAÇÃO</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">3 semanas pós-queimada</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Rebrota: meristemas basais</text></svg>","nar":"Três semanas após a queimada. O solo negro começa a revelar pontilhados verdes. Cervos já pastam na área. O que ocorre com a vegetação nas semanas seguintes a uma queimada?","q":"O que caracteriza a recuperação da vegetação nas semanas após uma queimada?","cs":[{"l":"?","t":"Rebrota rápida pelos meristemas basais protegidos, atraindo herbívoros para pasto novo","p":10,"e":"✅","tp":"c","fb":"Exato! Os meristemas basais das gramíneas ficam protegidos no solo durante o fogo. Rebrotam vigorosamente em dias, produzindo forragem nova e tenra que atrai cervos, capivaras e emas."},{"l":"?","t":"Leva décadas para se recuperar pois o fogo destrói completamente as raízes","p":0,"e":"❌","tp":"x","fb":"Gramíneas e ciperáceas do Pantanal têm meristemas basais subterrâneos que sobrevivem ao fogo. A rebrota é em dias, não décadas. As plantas pantaneiras são adaptadas ao regime de fogo."},{"l":"?","t":"Cresce mais devagar que antes pois o solo perde todos os seus nutrientes","p":0,"e":"❌","tp":"x","fb":"O solo não perde nutrientes — as cinzas os LIBERAM! A rebrota é mais vigorosa do que antes, pois o fósforo e potássio das cinzas fertilizam intensamente o solo recém-queimado."}]},{"n":6,"title":"Fogo e Biodiversidade","sub":"Mosaico de Habitats – Observação","icon":"🗺️","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"g1b5e\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#1b5e20\"/><stop offset=\"100%\" stop-color=\"#ff8f00\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#g1b5e)\"/><rect y=\"105\" width=\"340\" height=\"65\" fill=\"#43a047\" opacity=\".6\"/><path d=\"M0,96 Q60,84 120,90 Q180,84 240,90 Q290,84 340,90 L340,108 L0,108Z\" fill=\"#a5d6a7\"/><line x1=\"60\" y1=\"105\" x2=\"60\" y2=\"18\" stroke=\"#5d4037\" stroke-width=\"5\"/><ellipse cx=\"60\" cy=\"16\" rx=\"24\" ry=\"11\" fill=\"#1b5e20\"/><ellipse cx=\"60\" cy=\"9\" rx=\"18\" ry=\"8\" fill=\"#2e7d32\"/><line x1=\"160\" y1=\"105\" x2=\"158\" y2=\"28\" stroke=\"#4e342e\" stroke-width=\"4\"/><ellipse cx=\"158\" cy=\"26\" rx=\"20\" ry=\"9\" fill=\"#33691e\"/><line x1=\"270\" y1=\"105\" x2=\"268\" y2=\"22\" stroke=\"#5d4037\" stroke-width=\"5\"/><ellipse cx=\"268\" cy=\"20\" rx=\"22\" ry=\"10\" fill=\"#1b5e20\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">MOSAICO DE HABITATS</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Diferentes estágios de regeneração</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Diversidade: beta elevada</text></svg>","nar":"Do alto de uma cordilheira, você observa o mosaico: áreas recém-queimadas, em regeneração e maduras. Como o regime moderado de queimadas se relaciona com a biodiversidade pantaneira?","q":"Qual é a relação entre regime moderado de queimadas e biodiversidade?","cs":[{"l":"?","t":"Queimadas moderadas criam mosaico de habitats que sustenta maior diversidade total","p":10,"e":"✅","tp":"c","fb":"Correto! O mosaico de habitats em diferentes estágios de regeneração cria heterogeneidade que sustenta mais espécies do que uma paisagem uniforme. É a hipótese da perturbação intermediária."},{"l":"?","t":"Qualquer queimada, mesmo moderada, reduz a biodiversidade em todos os grupos","p":0,"e":"❌","tp":"x","fb":"A hipótese da perturbação intermediária demonstra que queimadas moderadas AUMENTAM a biodiversidade ao criar mosaico de habitats. É a ausência total de fogo que pode reduzir a diversidade."},{"l":"?","t":"Queimadas frequentes sempre maximizam a biodiversidade ao criar clareiras novas","p":0,"e":"❌","tp":"x","fb":"Queimadas EXCESSIVAS reduzem a biodiversidade por homogeneizar a paisagem em estágio inicial permanente. Só o regime MODERADO equilibra a criação de habitats novos com a maturação dos antigos."}]},{"n":7,"title":"Fogo e Mudanças Climáticas","sub":"Análise de Tendências – Dados INPE","icon":"🌡️","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"g3747\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#37474f\"/><stop offset=\"100%\" stop-color=\"#bf360c\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#g3747)\"/><path d=\"M0,95 Q30,70 55,80 Q80,56 110,72 Q140,46 165,62 Q188,42 210,60 Q235,48 260,66 Q288,54 312,74 L340,80 L340,130 L0,130Z\" fill=\"#e65100\"/><circle cx=\"80\" cy=\"50\" r=\"18\" fill=\"#ff9800\" opacity=\".7\"/><circle cx=\"200\" cy=\"42\" r=\"20\" fill=\"#ff6d00\" opacity=\".65\"/><line x1=\"100\" y1=\"0\" x2=\"82\" y2=\"130\" stroke=\"rgba(80,80,80,.4)\" stroke-width=\"8\"/><line x1=\"200\" y1=\"0\" x2=\"185\" y2=\"130\" stroke=\"rgba(80,80,80,.35)\" stroke-width=\"11\"/><rect y=\"130\" width=\"340\" height=\"40\" fill=\"#795548\" opacity=\".6\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">FOCOS DE INCÊNDIO</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Pantanal: tendência de alta</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">2020: recorde histórico</text></svg>","nar":"Dados do INPE mostram aumento dos focos de incêndio no Pantanal. Em 2020, o Pantanal queimou mais de 30% de sua área. Como as mudanças climáticas afetam o regime de fogo?","q":"Como as mudanças climáticas afetam o regime de queimadas no Pantanal?","cs":[{"l":"?","t":"Ampliam períodos de seca e aumentam a frequência e a intensidade das queimadas","p":10,"e":"✅","tp":"c","fb":"Correto! Períodos de seca mais prolongados ressecam a vegetação, aumentando a carga de combustível. Temperaturas mais altas potencializam a propagação. 2020 foi consequência direta dessa tendência."},{"l":"?","t":"Aumentam a umidade do ar, reduzindo o risco de ignição e propagação do fogo","p":0,"e":"❌","tp":"x","fb":"As mudanças climáticas no Pantanal estão associadas ao AUMENTO das secas (menor precipitação, maior temperatura), não ao aumento de umidade. Isso intensifica o risco de queimadas."},{"l":"?","t":"Não alteram o regime de fogo, que depende exclusivamente de ações humanas","p":0,"e":"❌","tp":"x","fb":"As mudanças climáticas afetam diretamente a secura da vegetação e a duração dos períodos de seca, criando condições para queimadas mais intensas mesmo sem ação humana direta."}]}]},
{"id":"cultura","icon":"🤠","title":"Cultura Pantaneira","sub":"Tradições, culinária e identidade","color":"#6d4c41","diff":1,"phases":[{"n":1,"title":"O Peão Pantaneiro","sub":"Fazenda Tradicional – Amanhecer","icon":"🤠","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"gefeb\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#efebe9\"/><stop offset=\"100%\" stop-color=\"#3e2723\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#gefeb)\"/><rect y=\"110\" width=\"340\" height=\"60\" fill=\"#8d6e63\" opacity=\".6\"/><path d=\"M0,100 Q80,88 170,96 Q255,88 340,96 L340,114 L0,114Z\" fill=\"#a5d6a7\" opacity=\".7\"/><rect x=\"220\" y=\"62\" width=\"50\" height=\"40\" rx=\"4\" fill=\"#8d6e63\"/><rect x=\"218\" y=\"50\" width=\"54\" height=\"16\" rx=\"3\" fill=\"#6d4c41\"/><rect x=\"238\" y=\"60\" width=\"8\" height=\"42\" rx=\"1\" fill=\"#5d4037\"/><path d=\"M180,105 Q200,96 240,100 Q260,103 280,100 L275,115 Q255,118 235,114 Q205,112 185,110Z\" fill=\"#4e342e\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">PEÃO PANTANEIRO</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Identidade cultural única</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Trabalho: condução de boiada</text></svg>","nar":"O sol nasce sobre a planície. O peão já sela o cavalo para conduzir a boiada. Figura central da cultura pantaneira, seu trabalho moldou a paisagem e a identidade da região. Qual é sua função central?","q":"Qual é a função central do peão pantaneiro na fazenda tradicional?","cs":[{"l":"?","t":"Conduzir boiadas, manejar gado bovino e manter cercas, aguadas e curraleiros","p":10,"e":"✅","tp":"c","fb":"Correto! O peão pantaneiro é especialista em pecuária extensiva adaptada às cheias. Conduz boiadas para terrenos altos na cheia, volta às pastagens na seca. Essa habilidade é única no Brasil."},{"l":"?","t":"Cultivar arroz, milho e mandioca para garantir a subsistência das famílias rurais","p":0,"e":"❌","tp":"x","fb":"O Pantanal não é região de agricultura intensiva — é região de pecuária extensiva. O peão trabalha com gado bovino, não com lavoura. A agricultura de subsistência existe, mas não é sua função principal."},{"l":"?","t":"Pescar e comercializar o pescado para abastecer os mercados das cidades próximas","p":0,"e":"❌","tp":"x","fb":"A pesca pantaneira é atividade complementar e de subsistência. A função central do peão é o manejo do gado bovino em uma das maiores regiões de pecuária extensiva do Brasil."}]},{"n":2,"title":"A Culinária Pantaneira","sub":"Barraco de Pesca – Almoço","icon":"🍽️","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"gfff3\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#fff3e0\"/><stop offset=\"100%\" stop-color=\"#5d4037\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#gfff3)\"/><rect y=\"110\" width=\"340\" height=\"60\" fill=\"#8d6e63\" opacity=\".6\"/><path d=\"M0,100 Q80,88 170,96 Q255,88 340,96 L340,114 L0,114Z\" fill=\"#a5d6a7\" opacity=\".7\"/><rect x=\"220\" y=\"62\" width=\"50\" height=\"40\" rx=\"4\" fill=\"#8d6e63\"/><rect x=\"218\" y=\"50\" width=\"54\" height=\"16\" rx=\"3\" fill=\"#6d4c41\"/><rect x=\"238\" y=\"60\" width=\"8\" height=\"42\" rx=\"1\" fill=\"#5d4037\"/><path d=\"M180,105 Q200,96 240,100 Q260,103 280,100 L275,115 Q255,118 235,114 Q205,112 185,110Z\" fill=\"#4e342e\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">CULINÁRIA LOCAL</text><text x=\"115\" y=\"30\" text-ancho
