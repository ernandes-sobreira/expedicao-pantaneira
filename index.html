        <div style="font-size:30px;font-weight:900;color:#69f0ae;margin:10px 0">${G.score}/${G.maxScore} pts</div>
        <div style="color:rgba(255,255,255,.7);font-size:14px;margin-bottom:20px">⏱️ ${fmtTime(G.elapsed)} · ${pct}% de acerto</div>
        <p style="color:rgba(255,255,255,.8);font-size:14px;margin-bottom:14px;font-weight:600">Salvar no ranking global?</p>
        <input id="rankName" class="txt-in" type="text" placeholder="Seu nome..." maxlength="30" value="${jq2(PLAYER)}" style="margin-bottom:12px"/>
        <div style="display:flex;gap:10px">
          <button id="savebtn" class="btn" onclick="doSaveRank()" style="background:linear-gradient(135deg,#69f0ae,#00c853);color:#1b5e20;flex:1;padding:13px">🌍 Salvar</button>
          <button class="btn" onclick="skipRank()" style="background:rgba(255,255,255,.15);color:white;padding:13px">Pular</button>
        </div>
        ${FB_URL?'':`<div style="margin-top:10px;color:rgba(255,255,255,.5);font-size:11px">⚠️ Ranking global não configurado — salvando localmente.</div>`}
      </div>
    </div>
  </div>`);
  const inp=$('rankName');
  if(inp){inp.focus();inp.addEventListener('keydown',e=>{if(e.key==='Enter')doSaveRank()})}
}

function renderEnding(saved){
  const pct=Math.round(G.score/G.maxScore*100);
  const medal=pct>=90?'🥇':pct>=70?'🥈':pct>=50?'🥉':'🎖️';
  const msg=pct>=90?'Pesquisador Expert!':pct>=70?'Boa Expedição!':pct>=50?'Continue Praticando!':'Volte ao Campo!';
  const topRanks=getRanksLocal().filter(r=>r.expId===G.expId).slice(0,5);
  const rankRows=topRanks.length?topRanks.map((r,i)=>`<div class="rank-row ${i<3?'top3':''}">
    <span style="font-size:16px;min-width:24px">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1+'º'}</span>
    <span style="font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${jq2(r.name)}</span>
    <span style="color:${EXP.color};font-weight:800">${r.score}/${r.maxScore}</span>
    <span style="color:#9e9e9e;font-size:12px">⏱️${fmtTime(r.secs)}</span>
  </div>`).join(''):'';
  R(`<div class="sc" style="background:#fafafa">
    <div style="background:${EXP.color};padding:28px 20px;text-align:center">
      <div style="font-size:56px;margin-bottom:8px">${medal}</div>
      <h2 style="font-family:'Fraunces',serif;color:white;font-size:22px;font-weight:900">${msg}</h2>
      <div style="font-size:34px;font-weight:900;color:white;margin:8px 0">${G.score}/${G.maxScore}</div>
      <div style="color:rgba(255,255,255,.75);font-size:14px">⏱️ ${fmtTime(G.elapsed)} · ${pct}%</div>
    </div>
    <div style="padding:18px;max-width:600px;margin:0 auto;width:100%">
      ${rankRows?`<div class="card" style="margin-bottom:14px">
        <div style="font-size:12px;font-weight:800;color:#616161;text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px">🏆 Top desta Expedição (local)</div>
        ${rankRows}
      </div>`:''}
      <div style="display:flex;flex-direction:column;gap:10px">
        <button class="btn" onclick="loadExp('${G.expId}')" style="background:${EXP.color};color:white;padding:14px;font-size:15px;border-radius:14px">🔄 Tentar Novamente</button>
        <button class="btn" onclick="renderHub()" style="background:#e0e0e0;color:#424242;padding:14px;font-size:15px;border-radius:14px">🏠 Hub de Expedições</button>
        <button class="btn" onclick="renderRanking()" style="background:white;color:#424242;padding:14px;font-size:15px;border-radius:14px;border:2px solid #e0e0e0">🌍 Ranking Global</button>
      </div>
    </div>
  </div>`);
}

/* ════════════════════════════════════
   RANKING SCREEN
════════════════════════════════════ */
window.renderRanking=async function(){
  R(`<div class="sc intro-bg" style="align-items:center;justify-content:center">
    <div style="text-align:center;color:white;padding:40px">
      <div class="loading-ring" style="margin-bottom:12px"></div>
      <div>Carregando ranking global...</div>
    </div>
  </div>`);
  const fbData = await fbGet();
  const useGlobal = fbData && fbData.length > 0;
  const allData = useGlobal ? fbData : getRanksLocal();
  const byExp={};
  EXPEDITIONS.forEach(e=>{byExp[e.id]={title:e.title,icon:e.icon,color:e.color,rows:[]}});
  allData.forEach(r=>{if(byExp[r.expId])byExp[r.expId].rows.push(r)});
  Object.values(byExp).forEach(e=>{e.rows.sort((a,b)=>b.score!==a.score?b.score-a.score:a.secs-b.secs)});

  const tabs=EXPEDITIONS.map((e,i)=>`<button onclick="showRankTab(${i})" id="rtab${i}" class="btn" style="background:${e.color}22;color:${e.color};font-size:12px;padding:7px 12px;border-radius:20px;white-space:nowrap">${e.icon} ${e.title.split(' ').slice(0,2).join(' ')}</button>`).join('');

  const sections=EXPEDITIONS.map((e,i)=>{
    const rows=byExp[e.id].rows.slice(0,15);
    const rowsHtml=rows.length?rows.map((r,j)=>`<div class="rank-row ${j<3?'top3':''}">
      <span style="font-size:16px;min-width:26px">${j===0?'🥇':j===1?'🥈':j===2?'🥉':j+1+'º'}</span>
      <span style="font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${jq2(r.name)}</span>
      <span style="font-size:11px;color:#9e9e9e;margin-right:4px">${r.date||''}</span>
      <span style="color:${e.color};font-weight:800;min-width:58px;text-align:right">${r.score}/${r.maxScore}</span>
      <span style="color:#9e9e9e;font-size:12px;min-width:52px;text-align:right">⏱️${fmtTime(r.secs)}</span>
    </div>`).join(''):`<div style="text-align:center;color:#9e9e9e;padding:24px;font-size:14px">Nenhum resultado ainda. Seja o primeiro!</div>`;
    return `<div id="rsec${i}" style="display:${i===0?'block':'none'}">${rowsHtml}</div>`;
  }).join('');

  const source = useGlobal ? `🌍 Ranking Global · ${allData.length} resultados` : `💾 Ranking Local (Firebase não configurado)`;
  R(`<div class="sc" style="background:#f0f4f0">
    <div style="background:linear-gradient(135deg,#1b5e20,#004d40);padding:20px 18px;text-align:center">
      <button class="btn" onclick="renderHub()" style="background:rgba(255,255,255,.15);color:white;font-size:13px;padding:7px 14px;margin-bottom:14px">← Hub</button>
      <div style="font-size:32px">🏆</div>
      <h2 style="font-family:'Fraunces',serif;color:white;font-size:22px;font-weight:900">Ranking Global</h2>
      <p style="color:rgba(255,255,255,.65);font-size:12px;margin-top:4px">${source}</p>
    </div>
    <div style="padding:16px 18px;max-width:700px;margin:0 auto;width:100%">
      <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:14px;scrollbar-width:none">
        ${tabs}
      </div>
      <div class="card">${sections}</div>
      ${!useGlobal && FB_URL?`<div style="background:#fff3e0;border-radius:12px;padding:12px 16px;margin-top:12px;font-size:13px;color:#e65100">⚠️ Não foi possível conectar ao Firebase. Mostrando ranking local.</div>`:''}
      ${!FB_URL?`<div style="background:#e3f2fd;border-radius:12px;padding:12px 16px;margin-top:12px;font-size:13px;color:#1565c0">ℹ️ Para ranking global, configure a variável FB_URL no código com seu Firebase Realtime Database.</div>`:''}
      <div style="text-align:center;margin-top:14px">
        <button class="btn" onclick="clearRanks()" style="background:#ffebee;color:#c62828;font-size:12px;padding:8px 18px">🗑️ Limpar Local</button>
      </div>
    </div>
  </div>`);
  showRankTab(0);
};

window.showRankTab=function(i){
  EXPEDITIONS.forEach((_,j)=>{
    const s=$('rsec'+j), t=$('rtab'+j);
    if(s)s.style.display=j===i?'block':'none';
    if(t){t.style.fontWeight=j===i?'800':'600';t.style.opacity=j===i?'1':'.7';}
  });
};

/* ════ BOOT ════ */
renderIntro();
</script>
</body>
</html>
