r=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Pintado na telha</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Símbolo: da gastronomia pantaneira</text></svg>","nar":"No barraco de pesca, o guia prepara o almoço sobre brasas. O cheiro de peixe fresco invade o ar. Qual prato tipifica a culinária pantaneira de forma mais reconhecida?","q":"Qual prato tipifica a culinária pantaneira de forma mais reconhecida?","cs":[{"l":"?","t":"Pintado na telha, peixe regional assado diretamente sobre telha de barro quente","p":10,"e":"✅","tp":"c","fb":"Correto! O pintado na telha é o prato símbolo do Pantanal. O pintado (Pseudoplatystoma corruscans) é assado diretamente sobre telha cerâmica, técnica simples e de resultado incomparável."},{"l":"?","t":"Churrasco de costela bovina, típico das festas de fazenda por toda a região","p":0,"e":"❌","tp":"x","fb":"O churrasco bovino é comum nas fazendas, mas não é o prato símbolo da identidade pantaneira. O pintado na telha é exclusivo e amplamente reconhecido como o prato mais emblemático da região."},{"l":"?","t":"Arroz com pacu, prato de preparo simples consumido nas cidades do interior","p":0,"e":"❌","tp":"x","fb":"O pacu é muito consumido, mas o prato símbolo que define a culinária pantaneira perante o Brasil é o pintado na telha — técnica de preparo singular e ingrediente nobre do Pantanal."}]},{"n":3,"title":"A Música Pantaneira","sub":"Festa da Fazenda – Noite","icon":"🎵","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"gfff8\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#fff8e1\"/><stop offset=\"100%\" stop-color=\"#6d4c41\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#gfff8)\"/><rect y=\"110\" width=\"340\" height=\"60\" fill=\"#8d6e63\" opacity=\".6\"/><path d=\"M0,100 Q80,88 170,96 Q255,88 340,96 L340,114 L0,114Z\" fill=\"#a5d6a7\" opacity=\".7\"/><rect x=\"220\" y=\"62\" width=\"50\" height=\"40\" rx=\"4\" fill=\"#8d6e63\"/><rect x=\"218\" y=\"50\" width=\"54\" height=\"16\" rx=\"3\" fill=\"#6d4c41\"/><rect x=\"238\" y=\"60\" width=\"8\" height=\"42\" rx=\"1\" fill=\"#5d4037\"/><path d=\"M180,105 Q200,96 240,100 Q260,103 280,100 L275,115 Q255,118 235,114 Q205,112 185,110Z\" fill=\"#4e342e\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">MÚSICA TRADICIONAL</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Cururu e Siriri</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Raízes: indígena e portuguesa</text></svg>","nar":"Uma festa de fazenda. Músicos tocam instrumentos de corda e percussão. Casais dançam em formação. Qual ritmo musical tem origem mais profunda na tradição pantaneira?","q":"Qual ritmo musical tem raízes mais profundas na tradição pantaneira?","cs":[{"l":"?","t":"Cururu e siriri, danças cantadas com raízes indígenas e de colonização portuguesa","p":10,"e":"✅","tp":"c","fb":"Correto! Cururu e siriri são ritmos tradicionais do Pantanal e Baixada Cuiabana. Mesclam influências indígenas, africanas e europeias. O cururu é cantado em duplas com viola e fandango."},{"l":"?","t":"Sertanejo universitário, estilo moderno que domina as festas rurais da região","p":0,"e":"❌","tp":"x","fb":"O sertanejo universitário é produto da indústria musical moderna. Os ritmos tradicionais do Pantanal são o cururu e o siriri, com séculos de história e mistura cultural única."},{"l":"?","t":"Forró nordestino, trazido pelos migrantes da caatinga que chegaram ao Pantanal","p":0,"e":"❌","tp":"x","fb":"O forró é nordestino. Os ritmos originais do Pantanal são o cururu (de influência indígena-portuguesa com viola de cocho) e o siriri (dança de roda), anteriores aos movimentos migratórios modernos."}]},{"n":4,"title":"Cáceres e o Pantanal","sub":"Porto de Cáceres – História","icon":"⚓","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"ge3f2\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#e3f2fd\"/><stop offset=\"100%\" stop-color=\"#1565c0\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#ge3f2)\"/><rect y=\"80\" width=\"340\" height=\"90\" fill=\"#29b6f6\" opacity=\".8\"/><line x1=\"0\" y1=\"95\" x2=\"340\" y2=\"95\" stroke=\"rgba(255,255,255,.3)\" stroke-width=\"1.5\"/><circle cx=\"280\" cy=\"35\" r=\"26\" fill=\"#fff9c4\" opacity=\".8\"/><circle cx=\"280\" cy=\"35\" r=\"18\" fill=\"#ffe57f\"/><path d=\"M0,72 Q60,60 120,66 Q180,60 240,66 Q295,60 340,66 L340,84 L0,84Z\" fill=\"#66bb6a\" opacity=\".8\"/><path d=\"M140,90 Q160,82 200,86 Q220,89 240,86 L235,100 Q215,103 195,100 Q165,97 145,95Z\" fill=\"#4e342e\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">CACERES-MT</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Capital do Pantanal</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Festival: maior pesca do mundo</text></svg>","nar":"Você chega ao Porto de Cáceres. Barcos de pesca, turistas e pescadores dividem o espaço. O que consagrou Cáceres-MT como referência cultural e turística do Pantanal?","q":"O que consagrou Cáceres-MT como capital cultural do Pantanal mato-grossense?","cs":[{"l":"?","t":"Ser porta de entrada histórica do Pantanal e sediar o maior festival de pesca","p":10,"e":"✅","tp":"c","fb":"Correto! Fundada em 1778, Cáceres é o acesso histórico ao Alto Paraguai. O Festival Internacional de Pesca de Cáceres é reconhecido como o maior do mundo, reunindo pescadores de 40 países."},{"l":"?","t":"Ter a maior extensão territorial e a maior população de toda a região pantaneira","p":0,"e":"❌","tp":"x","fb":"Cáceres não é o município mais extenso nem mais populoso do Pantanal. Sua importância vem da história e do festival de pesca, não de indicadores populacionais ou territoriais."},{"l":"?","t":"Concentrar toda a produção industrial e agropecuária do bioma mato-grossense","p":0,"e":"❌","tp":"x","fb":"A produção agropecuária está distribuída por vários municípios. A importância de Cáceres é histórica (fundação 1778) e cultural (Festival de Pesca, porta de entrada do Pantanal)."}]},{"n":5,"title":"A Fazenda Tradicional","sub":"Pecuária Extensiva – Análise","icon":"🐄","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"gfff8\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#fff8e1\"/><stop offset=\"100%\" stop-color=\"#5d4037\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#gfff8)\"/><rect y=\"110\" width=\"340\" height=\"60\" fill=\"#8d6e63\" opacity=\".6\"/><path d=\"M0,100 Q80,88 170,96 Q255,88 340,96 L340,114 L0,114Z\" fill=\"#a5d6a7\" opacity=\".7\"/><rect x=\"220\" y=\"62\" width=\"50\" height=\"40\" rx=\"4\" fill=\"#8d6e63\"/><rect x=\"218\" y=\"50\" width=\"54\" height=\"16\" rx=\"3\" fill=\"#6d4c41\"/><rect x=\"238\" y=\"60\" width=\"8\" height=\"42\" rx=\"1\" fill=\"#5d4037\"/><path d=\"M180,105 Q200,96 240,100 Q260,103 280,100 L275,115 Q255,118 235,114 Q205,112 185,110Z\" fill=\"#4e342e\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">FAZENDA PANTANEIRA</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Pecuária extensiva adaptada</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Ciclo: cheia e seca</text></svg>","nar":"Você visita uma fazenda que opera há 150 anos no Pantanal. O dono descreve como o gado sobe para a cordilheira na cheia e volta às pastagens na seca. O que caracteriza esse modelo?","q":"O que caracteriza o modelo tradicional de fazenda de gado no Pantanal?","cs":[{"l":"?","t":"Pecuária extensiva com baixa lotação, adaptada ao ciclo natural de cheias e secas","p":10,"e":"✅","tp":"c","fb":"Correto! A pecuária pantaneira tradicional usa baixa lotação animal e adapta o manejo ao pulso de inundação. Esse modelo tem coexistido com a biodiversidade há séculos, sendo relativamente sustentável."},{"l":"?","t":"Confinamento intensivo de bovinos com irrigação artificial das pastagens nativas","p":0,"e":"❌","tp":"x","fb":"O confinamento contradiz a essência da pecuária pantaneira, que é extensiva e adaptada às inundações. A irrigação artificial seria desnecessária e incoerente com o regime natural de cheias."},{"l":"?","t":"Agricultura mecanizada combinada com criação intensiva de suínos e aves","p":0,"e":"❌","tp":"x","fb":"Suinocultura e avicultura intensivas são sistemas completamente diferentes da pecuária extensiva pantaneira. A fazenda tradicional do Pantanal é centrada no gado bovino em pastagens naturais."}]},{"n":6,"title":"Artesanato Pantaneiro","sub":"Feira Artesanal – Cáceres","icon":"🎨","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"gefeb\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#efebe9\"/><stop offset=\"100%\" stop-color=\"#4e342e\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#gefeb)\"/><rect y=\"110\" width=\"340\" height=\"60\" fill=\"#8d6e63\" opacity=\".6\"/><path d=\"M0,100 Q80,88 170,96 Q255,88 340,96 L340,114 L0,114Z\" fill=\"#a5d6a7\" opacity=\".7\"/><rect x=\"220\" y=\"62\" width=\"50\" height=\"40\" rx=\"4\" fill=\"#8d6e63\"/><rect x=\"218\" y=\"50\" width=\"54\" height=\"16\" rx=\"3\" fill=\"#6d4c41\"/><rect x=\"238\" y=\"60\" width=\"8\" height=\"42\" rx=\"1\" fill=\"#5d4037\"/><path d=\"M180,105 Q200,96 240,100 Q260,103 280,100 L275,115 Q255,118 235,114 Q205,112 185,110Z\" fill=\"#4e342e\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">ARTESANATO LOCAL</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Couro, carandá e madeira</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Técnicas: tradicionais regionais</text></svg>","nar":"Na feira artesanal de Cáceres, peças de couro, palha e madeira expõem a habilidade dos artesãos locais. Quais materiais dominam o artesanato tradicional pantaneiro?","q":"Quais materiais dominam o artesanato tradicional produzido no Pantanal?","cs":[{"l":"?","t":"Couro bovino, palha de carandá e madeira regional para bolsas, chapéus e mobília","p":10,"e":"✅","tp":"c","fb":"Correto! O artesanato pantaneiro usa recursos locais: couro dos bovinos criados na região, palha da palmeira carandá para chapéus e bolsas, e madeiras nativas para mobília e utensílios."},{"l":"?","t":"Algodão, linho e fibras sintéticas importadas trabalhadas em cooperativas regionais","p":0,"e":"❌","tp":"x","fb":"Não são materiais locais do Pantanal. O artesanato regional é baseado em recursos nativos — couro bovino, palha de carandá e madeiras da região, não em fibras têxteis importadas."},{"l":"?","t":"Plástico reciclado e materiais reaproveitados de embalagens de produtos agropecuários","p":0,"e":"❌","tp":"x","fb":"O artesanato tradicional pantaneiro não usa plástico reciclado. É baseado em materiais naturais locais — couro, palha de carandá, cipós e madeiras — com técnicas transmitidas entre gerações."}]},{"n":7,"title":"Festival de Pesca","sub":"Porto de Cáceres – Festival","icon":"🏆","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"ge3f2\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#e3f2fd\"/><stop offset=\"100%\" stop-color=\"#1565c0\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#ge3f2)\"/><rect y=\"80\" width=\"340\" height=\"90\" fill=\"#29b6f6\" opacity=\".8\"/><line x1=\"0\" y1=\"95\" x2=\"340\" y2=\"95\" stroke=\"rgba(255,255,255,.3)\" stroke-width=\"1.5\"/><circle cx=\"280\" cy=\"35\" r=\"26\" fill=\"#fff9c4\" opacity=\".8\"/><circle cx=\"280\" cy=\"35\" r=\"18\" fill=\"#ffe57f\"/><path d=\"M0,72 Q60,60 120,66 Q180,60 240,66 Q295,60 340,66 L340,84 L0,84Z\" fill=\"#66bb6a\" opacity=\".8\"/><path d=\"M140,90 Q160,82 200,86 Q220,89 240,86 L235,100 Q215,103 195,100 Q165,97 145,95Z\" fill=\"#4e342e\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">FESTIVAL DE PESCA</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Cáceres — Internacional</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">40 países: representados</text></svg>","nar":"O Festival Internacional de Pesca de Cáceres reúne pescadores de dezenas de países. Premiações, gastronomia e show cultural. O que esse festival representa para a identidade local?","q":"O que o Festival Internacional de Pesca de Cáceres representa culturalmente?","cs":[{"l":"?","t":"Vitrine mundial da cultura pantaneira, unindo pesca esportiva e identidade regional","p":10,"e":"✅","tp":"c","fb":"Correto! O Festival é o maior do mundo no segmento e projetou Cáceres internacionalmente. Além da competição, valoriza a gastronomia, o artesanato e o modo de vida pantaneiro."},{"l":"?","t":"Evento privado restrito a pescadores profissionais registrados no sistema estadual","p":0,"e":"❌","tp":"x","fb":"O Festival é aberto e internacional, não restrito. É justamente sua abertura a pescadores amadores e profissionais de 40 países que o consagrou como o maior festival de pesca do mundo."},{"l":"?","t":"Competição esportiva internacional sem relação com a identidade cultural pantaneira","p":0,"e":"❌","tp":"x","fb":"O Festival é profundamente integrado à cultura local — promove gastronomia de peixe, artesanato, música regional e valoriza o modo de vida do pescador pantaneiro como identidade."}]}]},
{"id":"flora","icon":"🌿","title":"Flora do Pantanal","sub":"Plantas, ecossistemas e paisagem","color":"#33691e","diff":2,"phases":[{"n":1,"title":"O Carandazal","sub":"Planície Alagável – Campo Limpo","icon":"🌴","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"ge8f5\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#e8f5e9\"/><stop offset=\"100%\" stop-color=\"#33691e\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#ge8f5)\"/><rect y=\"105\" width=\"340\" height=\"65\" fill=\"#43a047\" opacity=\".6\"/><path d=\"M0,96 Q60,84 120,90 Q180,84 240,90 Q290,84 340,90 L340,108 L0,108Z\" fill=\"#a5d6a7\"/><line x1=\"60\" y1=\"105\" x2=\"60\" y2=\"18\" stroke=\"#5d4037\" stroke-width=\"5\"/><ellipse cx=\"60\" cy=\"16\" rx=\"24\" ry=\"11\" fill=\"#1b5e20\"/><ellipse cx=\"60\" cy=\"9\" rx=\"18\" ry=\"8\" fill=\"#2e7d32\"/><line x1=\"160\" y1=\"105\" x2=\"158\" y2=\"28\" stroke=\"#4e342e\" stroke-width=\"4\"/><ellipse cx=\"158\" cy=\"26\" rx=\"20\" ry=\"9\" fill=\"#33691e\"/><line x1=\"270\" y1=\"105\" x2=\"268\" y2=\"22\" stroke=\"#5d4037\" stroke-width=\"5\"/><ellipse cx=\"268\" cy=\"20\" rx=\"22\" ry=\"10\" fill=\"#1b5e20\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">CARANDÁ</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Copernicia alba</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Palmeira: símbolo do Pantanal</text></svg>","nar":"Uma extensão de palmeiras carandá se projeta do campo alagado. Espetáculo natural, o carandazal é uma das fitofisionomias mais características do Pantanal. Qual é a sua importância?","q":"Qual é a importância ecológica e cultural da palmeira carandá no Pantanal?","cs":[{"l":"?","t":"Forma carandazais densos, sustenta fauna diversa e fornece palha para artesanato","p":10,"e":"✅","tp":"c","fb":"Correto! Carandazais são ecossistemas ricos que abrigam animais desde insetos até aves nidificantes. A cera e a palha são usadas em artesanato e construção local há séculos."},{"l":"?","t":"É espécie exótica invasora que compete com a vegetação nativa e reduz diversidade","p":0,"e":"❌","tp":"x","fb":"Carandá (Copernicia alba) é espécie NATIVA do Pantanal, não invasora! É uma das espécies mais características e ecologicamente importantes do bioma."},{"l":"?","t":"Ocorre somente em terrenos permanentemente alagados sem qualquer uso econômico","p":0,"e":"❌","tp":"x","fb":"O carandá é encontrado em diferentes condições de umidade. Tem usos econômicos tradicionais importantes: cera para vernizes e velas, folhas para artesanato, cobertura e construção."}]},{"n":2,"title":"A Vitória-Régia","sub":"Baía das Flores – Manhã","icon":"🌸","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"ge0f7\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#e0f7fa\"/><stop offset=\"100%\" stop-color=\"#006064\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#ge0f7)\"/><rect y=\"98\" width=\"340\" height=\"72\" fill=\"#0277bd\" opacity=\".78\"/><line x1=\"0\" y1=\"112\" x2=\"340\" y2=\"112\" stroke=\"rgba(255,255,255,.3)\" stroke-width=\"1.5\"/><line x1=\"30\" y1=\"130\" x2=\"120\" y2=\"130\" stroke=\"rgba(255,255,255,.22)\" stroke-width=\"1\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">VICTORIA AMAZONICA</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Folhas até 3 m de diâmetro</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Flor: termogênica noturna</text></svg>","nar":"Grandes folhas circulares flutuam sobre a lagoa. No centro, uma flor branca começa a abrir. É a vitória-régia. Como essa planta realiza sua polinização?","q":"Como a vitória-régia realiza sua polinização peculiar?","cs":[{"l":"?","t":"Flores termogênicas atraem besouros noturnos que efetuam a polinização cruzada","p":10,"e":"✅","tp":"c","fb":"Correto! A vitória-régia aquece a flor (termogênese) para atrair besouros do gênero Cyclocephala. A flor fecha com o inseto dentro, poliniza-o e o libera pela manhã para polinizar outra flor."},{"l":"?","t":"A polinização ocorre pelo vento que dispersa o pólen pelas folhas flutuantes","p":0,"e":"❌","tp":"x","fb":"A vitória-régia é polinizada por besouros (entomofilia), não pelo vento (anemofilia). As flores grandes e carnosas com recompensa de calor e alimento são típicas de polinização por insetos."},{"l":"?","t":"Abelhas diurnas visitam as flores abertas em busca de néctar e levam o pólen","p":0,"e":"❌","tp":"x","fb":"A vitória-régia floresce à NOITE e fecha de manhã. Os polinizadores são besouros noturnos, não abelhas diurnas. A termogênese é o mecanismo de atração principal."}]},{"n":3,"title":"O Paratudo","sub":"Cordilheira Florescendo – Setembro","icon":"🌻","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"gfff8\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#fff8e1\"/><stop offset=\"100%\" stop-color=\"#f57f17\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#gfff8)\"/><rect y=\"105\" width=\"340\" height=\"65\" fill=\"#43a047\" opacity=\".6\"/><path d=\"M0,96 Q60,84 120,90 Q180,84 240,90 Q290,84 340,90 L340,108 L0,108Z\" fill=\"#a5d6a7\"/><line x1=\"60\" y1=\"105\" x2=\"60\" y2=\"18\" stroke=\"#5d4037\" stroke-width=\"5\"/><ellipse cx=\"60\" cy=\"16\" rx=\"24\" ry=\"11\" fill=\"#1b5e20\"/><ellipse cx=\"60\" cy=\"9\" rx=\"18\" ry=\"8\" fill=\"#2e7d32\"/><line x1=\"160\" y1=\"105\" x2=\"158\" y2=\"28\" stroke=\"#4e342e\" stroke-width=\"4\"/><ellipse cx=\"158\" cy=\"26\" rx=\"20\" ry=\"9\" fill=\"#33691e\"/><line x1=\"270\" y1=\"105\" x2=\"268\" y2=\"22\" stroke=\"#5d4037\" stroke-width=\"5\"/><ellipse cx=\"268\" cy=\"20\" rx=\"22\" ry=\"10\" fill=\"#1b5e20\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">TABEBUIA AUREA</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Floração: setembro-outubro</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Característica: flores sem folhas</text></svg>","nar":"Setembro. As cordilheiras exibem uma explosão de amarelo. O paratudo floresceu antes de brotar as folhas. Por que essa árvore é marco paisagístico do Pantanal?","q":"Por que o paratudo é marco paisagístico e cultural no Pantanal?","cs":[{"l":"?","t":"Floresce em setembro com flores amarelas intensas enquanto a árvore ainda está sem folhas","p":10,"e":"✅","tp":"c","fb":"Correto! O paratudo (Tabebuia aurea) tem floração espetacular em setembro-outubro, cobrindo as cordilheiras de amarelo intenso antes de brotar as folhas. Funciona também como planta medicinal."},{"l":"?","t":"É a madeira mais resistente do Pantanal, usada em construções e estruturas rurais","p":0,"e":"❌","tp":"x","fb":"O paratudo é valorizado pelo espetáculo visual de sua floração e por suas propriedades medicinais. Sua madeira não é particularmente destacada em relação a outras espécies regionais."},{"l":"?","t":"Produz frutos comestíveis consumidos por macacos, cervos e outros mamíferos","p":0,"e":"❌","tp":"x","fb":"O paratudo é mais conhecido pela floração visual espetacular e propriedades medicinais da casca do que pela frugivoria. Seus frutos secos e alados são dispersos pelo vento."}]},{"n":4,"title":"Macrófitas Aquáticas","sub":"Lagoa com Macrófitas – Pesquisa","icon":"🌿","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"ge8f5\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#e8f5e9\"/><stop offset=\"100%\" stop-color=\"#1b5e20\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#ge8f5)\"/><rect y=\"98\" width=\"340\" height=\"72\" fill=\"#0277bd\" opacity=\".78\"/><line x1=\"0\" y1=\"112\" x2=\"340\" y2=\"112\" stroke=\"rgba(255,255,255,.3)\" stroke-width=\"1.5\"/><line x1=\"30\" y1=\"130\" x2=\"120\" y2=\"130\" stroke=\"rgba(255,255,255,.22)\" stroke-width=\"1\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">MACRÓFITAS</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Habitat, filtro e O₂</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Espécies: Eichhornia, Salvinia</text></svg>","nar":"A lagoa está parcialmente coberta por macrófitas aquáticas. Você coleta amostras e mede parâmetros na área com e sem cobertura vegetal. Qual é a função ecológica dessas plantas?","q":"Qual é a função ecológica das macrófitas nas lagoas pantaneiras?","cs":[{"l":"?","t":"Oxigenam a água, filtram nutrientes excessivos e formam habitat para peixes e aves","p":10,"e":"✅","tp":"c","fb":"Correto! Macrófitas oxigenam a água pela fotossíntese, absorvem nutrientes (fósforo e nitrogênio), reduzem turbidez e formam habitat essencial para peixes jovens, aves e invertebrados."},{"l":"?","t":"Consomem o oxigênio disponível e bloqueiam a entrada de luz solar nas lagoas","p":0,"e":"❌","tp":"x","fb":"Macrófitas PRODUZEM oxigênio pela fotossíntese durante o dia. A sombra pode reduzir a fotossíntese bentônica, mas as plantas em si são produtoras líquidas de oxigênio na coluna de água."},{"l":"?","t":"São plantas ornamentais sem função ecológica relevante nos ecossistemas aquáticos","p":0,"e":"❌","tp":"x","fb":"Completamente errado! Macrófitas são componentes fundamentais dos ecossistemas aquáticos pantaneiros — produtoras primárias, filtros de nutrientes, habitat estrutural e fonte de alimento."}]},{"n":5,"title":"Os Cambará","sub":"Cordilheira Alta – Bosque","icon":"🌲","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"ge8f5\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#e8f5e9\"/><stop offset=\"100%\" stop-color=\"#2e7d32\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#ge8f5)\"/><rect y=\"105\" width=\"340\" height=\"65\" fill=\"#43a047\" opacity=\".6\"/><path d=\"M0,96 Q60,84 120,90 Q180,84 240,90 Q290,84 340,90 L340,108 L0,108Z\" fill=\"#a5d6a7\"/><line x1=\"60\" y1=\"105\" x2=\"60\" y2=\"18\" stroke=\"#5d4037\" stroke-width=\"5\"/><ellipse cx=\"60\" cy=\"16\" rx=\"24\" ry=\"11\" fill=\"#1b5e20\"/><ellipse cx=\"60\" cy=\"9\" rx=\"18\" ry=\"8\" fill=\"#2e7d32\"/><line x1=\"160\" y1=\"105\" x2=\"158\" y2=\"28\" stroke=\"#4e342e\" stroke-width=\"4\"/><ellipse cx=\"158\" cy=\"26\" rx=\"20\" ry=\"9\" fill=\"#33691e\"/><line x1=\"270\" y1=\"105\" x2=\"268\" y2=\"22\" stroke=\"#5d4037\" stroke-width=\"5\"/><ellipse cx=\"268\" cy=\"20\" rx=\"22\" ry=\"10\" fill=\"#1b5e20\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">CAMBARÁ</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Vochysia divergens</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Indicador: de solo não alagável</text></svg>","nar":"Você sobe uma cordilheira. A vegetação muda: palmeiras dão lugar a um bosque denso de cambará. Árvores altas, cipós. O que são esses capões e o que indicam?","q":"O que são os capões de cambará nas cordilheiras do Pantanal?","cs":[{"l":"?","t":"Bosques densos em terrenos mais elevados, indicadores fiéis de solos não alagáveis","p":10,"e":"✅","tp":"c","fb":"Correto! Os capões de cambará (Vochysia divergens) formam florestas nas cordilheiras, onde o solo não é inundado ou é inundado por pouco tempo. São excelentes indicadores de topografia e hidrologia."},{"l":"?","t":"Agrupamentos de bambu invasor que coloniza rapidamente áreas degradadas pelo gado","p":0,"e":"❌","tp":"x","fb":"Cambará (Vochysia divergens) é uma espécie arbórea nativa, não bambu invasor. Os capões de cambará são florestas naturais características de solos drenados nas cordilheiras pantaneiras."},{"l":"?","t":"Plantios de reflorestamento introduzidos para recuperar cordilheiras degradadas","p":0,"e":"❌","tp":"x","fb":"Os capões de cambará são formações vegetais NATURAIS. Ocorrem espontaneamente em terrenos mais elevados onde o solo permite o desenvolvimento de árvores de grande porte."}]},{"n":6,"title":"O Buriti","sub":"Vereda do Pantanal – Pesquisa","icon":"🌾","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"gfff8\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#fff8e1\"/><stop offset=\"100%\" stop-color=\"#33691e\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#gfff8)\"/><rect y=\"105\" width=\"340\" height=\"65\" fill=\"#43a047\" opacity=\".6\"/><path d=\"M0,96 Q60,84 120,90 Q180,84 240,90 Q290,84 340,90 L340,108 L0,108Z\" fill=\"#a5d6a7\"/><line x1=\"60\" y1=\"105\" x2=\"60\" y2=\"18\" stroke=\"#5d4037\" stroke-width=\"5\"/><ellipse cx=\"60\" cy=\"16\" rx=\"24\" ry=\"11\" fill=\"#1b5e20\"/><ellipse cx=\"60\" cy=\"9\" rx=\"18\" ry=\"8\" fill=\"#2e7d32\"/><line x1=\"160\" y1=\"105\" x2=\"158\" y2=\"28\" stroke=\"#4e342e\" stroke-width=\"4\"/><ellipse cx=\"158\" cy=\"26\" rx=\"20\" ry=\"9\" fill=\"#33691e\"/><line x1=\"270\" y1=\"105\" x2=\"268\" y2=\"22\" stroke=\"#5d4037\" stroke-width=\"5\"/><ellipse cx=\"268\" cy=\"20\" rx=\"22\" ry=\"10\" fill=\"#1b5e20\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">BURITI</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Mauritia flexuosa</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Arvore da vida: 17 usos documentados</text></svg>","nar":"Uma fileira de buritis acompanha uma linha de umidade no campo. O guia fala em \"árvore da vida\". Com 17 usos documentados, por que esse nome?","q":"Por que o buriti recebe o nome de arvore da vida no Pantanal?","cs":[{"l":"?","t":"Oferece fruto, óleo, palha, seiva e habitat para dezenas de espécies simultaneamente","p":10,"e":"✅","tp":"c","fb":"Correto! O buriti é multifuncional: frutos ricos em betacaroteno, óleo comestível, palha para artesanato, seiva aproveitada e tronco como habitat de aves e mamíferos. Indicador de veredas úmidas."},{"l":"?","t":"Cresce mais rápido que qualquer palmeira e sua sombra protege outras plantas menores","p":0,"e":"❌","tp":"x","fb":"O buriti não é a palmeira de crescimento mais rápido. O nome \"árvore da vida\" refere-se à sua multifuncionalidade ecológica e cultural, não à sua taxa de crescimento."},{"l":"?","t":"Seus frutos contêm compostos medicinais que curam doenças endêmicas da região","p":0,"e":"❌","tp":"x","fb":"Embora os frutos do buriti sejam nutritivos (ricos em betacaroteno), o nome \"árvore da vida\" refere-se à diversidade de usos — alimentar, artesanal, ambiental — não a propriedades medicinais curativas."}]},{"n":7,"title":"Campos Inundáveis","sub":"Planície Aberta – Fitossociologia","icon":"🌾","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"ge8f5\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#e8f5e9\"/><stop offset=\"100%\" stop-color=\"#1b5e20\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#ge8f5)\"/><rect y=\"98\" width=\"340\" height=\"72\" fill=\"#0277bd\" opacity=\".78\"/><line x1=\"0\" y1=\"112\" x2=\"340\" y2=\"112\" stroke=\"rgba(255,255,255,.3)\" stroke-width=\"1.5\"/><line x1=\"30\" y1=\"130\" x2=\"120\" y2=\"130\" stroke=\"rgba(255,255,255,.22)\" stroke-width=\"1\"/><line x1=\"40\" y1=\"98\" x2=\"40\" y2=\"30\" stroke=\"#33691e\" stroke-width=\"4\"/><ellipse cx=\"40\" cy=\"28\" rx=\"20\" ry=\"9\" fill=\"#2e7d32\"/><line x1=\"290\" y1=\"98\" x2=\"288\" y2=\"35\" stroke=\"#33691e\" stroke-width=\"3.5\"/><ellipse cx=\"288\" cy=\"33\" rx=\"18\" ry=\"8\" fill=\"#1b5e20\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">CAMPOS INUNDÁVEIS</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Fitofisionomia dominante</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">65%: da planície pantaneira</text></svg>","nar":"Olhando da cordilheira, o campo aberto domina a vista. Gramíneas, ciperáceas e macrófitas se alternam com a água. Qual fitofisionomia ocupa a maior extensão da planície?","q":"Qual fitofisionomia domina a maior extensão da planície pantaneira?","cs":[{"l":"?","t":"Campos inundáveis com gramíneas e ciperáceas, alternando com lagoas e matas ciliares","p":10,"e":"✅","tp":"c","fb":"Correto! Os campos inundáveis ocupam a maior extensão do Pantanal — cerca de 65% da planície. São dominados por gramíneas nativas e ciperáceas, inundados sazonalmente pelo pulso."},{"l":"?","t":"Florestas densas similares à Amazônia com dossel acima de 30 metros de altura","p":0,"e":"❌","tp":"x","fb":"Florestas densas são encontradas nas matas ciliares e capões, mas não dominam a extensão pantaneira. O Pantanal é predominantemente uma planície de campos abertos, não florestal."},{"l":"?","t":"Savanas abertas com cactos e bromélias adaptadas à estiagem prolongada e ao sol","p":0,"e":"❌","tp":"x","fb":"Cactos e bromélias em savanas secas são característicos do Cerrado e Caatinga, não do Pantanal. A planície pantaneira é definida pelas gramíneas de campos úmidos e inundáveis."}]}]},
{"id":"turismo","icon":"📸","title":"Turismo no Pantanal","sub":"Ecoturismo, pesca e comunidades","color":"#00838f","diff":1,"phases":[{"n":1,"title":"Destino Único","sub":"Chegada ao Pantanal – Portão","icon":"📸","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"ge3f2\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#e3f2fd\"/><stop offset=\"100%\" stop-color=\"#006064\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#ge3f2)\"/><rect y=\"80\" width=\"340\" height=\"90\" fill=\"#29b6f6\" opacity=\".8\"/><line x1=\"0\" y1=\"95\" x2=\"340\" y2=\"95\" stroke=\"rgba(255,255,255,.3)\" stroke-width=\"1.5\"/><circle cx=\"280\" cy=\"35\" r=\"26\" fill=\"#fff9c4\" opacity=\".8\"/><circle cx=\"280\" cy=\"35\" r=\"18\" fill=\"#ffe57f\"/><path d=\"M0,72 Q60,60 120,66 Q180,60 240,66 Q295,60 340,66 L340,84 L0,84Z\" fill=\"#66bb6a\" opacity=\".8\"/><path d=\"M140,90 Q160,82 200,86 Q220,89 240,86 L235,100 Q215,103 195,100 Q165,97 145,95Z\" fill=\"#4e342e\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">ECOTURISMO</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Maior visibilidade de fauna</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">do Brasil: e das Américas</text></svg>","nar":"Primeiro dia no Pantanal. Em apenas 2 horas de bote, você avistou 5 espécies de aves raras, uma onça e dezenas de jacarés. O que torna o Pantanal um destino único para o ecoturismo?","q":"O que torna o Pantanal destino único para o ecoturismo mundial?","cs":[{"l":"?","t":"Maior visibilidade de fauna silvestre do Brasil, com onças e araras facilmente avistadas","p":10,"e":"✅","tp":"c","fb":"Correto! O Pantanal tem a maior visibilidade de fauna da América do Sul. Campos abertos e baixa vegetação permitem avistar onças, araras-azuis, capivaras e jacarés com facilidade única."},{"l":"?","t":"Infraestrutura hoteleira de alto padrão com resorts e spas de natureza disponíveis","p":0,"e":"❌","tp":"x","fb":"O Pantanal atrai pelo oposto da infraestrutura urbana — pela natureza selvagem e autêntica. Pousadas rústicas e flutuantes são parte da experiência, não resorts sofisticados."},{"l":"?","t":"Custo de hospedagem muito baixo e clima agradável e estável durante todo o ano","p":0,"e":"❌","tp":"x","fb":"O turismo no Pantanal não é barato — é especializado. O diferencial é a experiência única de natureza, não o custo. O clima tem estações bem definidas, não é uniformemente agradável."}]},{"n":2,"title":"A Melhor Época","sub":"Planejamento da Visita","icon":"📅","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"gfff8\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#fff8e1\"/><stop offset=\"100%\" stop-color=\"#e65100\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#gfff8)\"/><rect y=\"80\" width=\"340\" height=\"90\" fill=\"#29b6f6\" opacity=\".8\"/><line x1=\"0\" y1=\"95\" x2=\"340\" y2=\"95\" stroke=\"rgba(255,255,255,.3)\" stroke-width=\"1.5\"/><circle cx=\"280\" cy=\"35\" r=\"26\" fill=\"#fff9c4\" opacity=\".8\"/><circle cx=\"280\" cy=\"35\" r=\"18\" fill=\"#ffe57f\"/><path d=\"M0,72 Q60,60 120,66 Q180,60 240,66 Q295,60 340,66 L340,84 L0,84Z\" fill=\"#66bb6a\" opacity=\".8\"/><path d=\"M140,90 Q160,82 200,86 Q220,89 240,86 L235,100 Q215,103 195,100 Q165,97 145,95Z\" fill=\"#4e342e\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">SAZONALIDADE</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Seca: mai-set | Cheia: dez-abr</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Observação de fauna: melhor na seca</text></svg>","nar":"Um casal quer fotografar fauna pantaneira. Você, como guia, recomenda qual época do ano? Cada estação tem suas características. Qual é a melhor para avistamento de animais?","q":"Em qual período o Pantanal oferece a melhor experiência para observar fauna?","cs":[{"l":"?","t":"Na seca (maio-setembro), quando a fauna concentra-se visível nas margens de lagoas","p":10,"e":"✅","tp":"c","fb":"Correto! Na seca a água recua, a fauna se concentra nas margens de baías e rios e a vegetação baixa facilita o avistamento. É o período clássico para onças, aves e jacarés."},{"l":"?","t":"Na cheia (dezembro-abril), com vegetação alta e maior riqueza de espécies ativas","p":0,"e":"❌","tp":"x","fb":"A cheia tem alta diversidade, mas a vegetação alta e a dispersão da fauna pelo campo inundado dificultam o avistamento. A seca concentra os animais em locais previsíveis e visíveis."},{"l":"?","t":"Na primavera (outubro-novembro), com floração intensa e chegada de aves migratórias","p":5,"e":"⚠️","tp":"w","fb":"Outubro-novembro é uma transição interessante com floração e chegada de aves, mas a concentração de fauna ainda não atingiu o pico da seca. É período secundário para observação."}]},{"n":3,"title":"A Transpantaneira","sub":"Estrada Transpantaneira – Km 50","icon":"🛣️","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"ge8f5\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#e8f5e9\"/><stop offset=\"100%\" stop-color=\"#0277bd\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#ge8f5)\"/><rect y=\"80\" width=\"340\" height=\"90\" fill=\"#29b6f6\" opacity=\".8\"/><line x1=\"0\" y1=\"95\" x2=\"340\" y2=\"95\" stroke=\"rgba(255,255,255,.3)\" stroke-width=\"1.5\"/><circle cx=\"280\" cy=\"35\" r=\"26\" fill=\"#fff9c4\" opacity=\".8\"/><circle cx=\"280\" cy=\"35\" r=\"18\" fill=\"#ffe57f\"/><path d=\"M0,72 Q60,60 120,66 Q180,60 240,66 Q295,60 340,66 L340,84 L0,84Z\" fill=\"#66bb6a\" opacity=\".8\"/><path d=\"M140,90 Q160,82 200,86 Q220,89 240,86 L235,100 Q215,103 195,100 Q165,97 145,95Z\" fill=\"#4e342e\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">TRANSPANTANEIRA</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">147 km | 147 pontes</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Paraíso: do turismo de natureza</text></svg>","nar":"Sua pousada fica no km 50 da Transpantaneira. Em 50 km de estrada você parou 30 vezes para fotografar animais. O que é a Transpantaneira e qual sua importância turística?","q":"O que é a Estrada Transpantaneira e por que atrai tantos visitantes?","cs":[{"l":"?","t":"Estrada de terra com 147 pontes, reconhecida como rota privilegiada de fauna silvestre","p":10,"e":"✅","tp":"c","fb":"Correto! A Transpantaneira tem 147 km e 147 pontes de madeira sobre baías e corixos. Cada ponte é um ponto de observação de fauna. É uma das rotas de ecoturismo mais famosas do mundo."},{"l":"?","t":"Rodovia asfaltada que liga Cuiabá a Corumbá atravessando integralmente o Pantanal","p":0,"e":"❌","tp":"x","fb":"A Transpantaneira NÃO é asfaltada e NÃO liga Cuiabá a Corumbá. Tem 147 km de chão batido, começa em Poconé-MT e termina em Porto Jofre, sem conexão com Corumbá."},{"l":"?","t":"Trilha ecológica de 40 km acessível apenas a guias especializados e credenciados","p":0,"e":"❌","tp":"x","fb":"A Transpantaneira é uma estrada aberta de 147 km, acessível a veículos com tração. Não é trilha restrita a guias — qualquer turista pode percorrê-la de carro, idealmente com guia."}]},{"n":4,"title":"Pesca Esportiva","sub":"Flutuante no Rio – Temporada","icon":"🎣","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"ge3f2\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#e3f2fd\"/><stop offset=\"100%\" stop-color=\"#1565c0\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#ge3f2)\"/><rect y=\"80\" width=\"340\" height=\"90\" fill=\"#29b6f6\" opacity=\".8\"/><line x1=\"0\" y1=\"95\" x2=\"340\" y2=\"95\" stroke=\"rgba(255,255,255,.3)\" stroke-width=\"1.5\"/><circle cx=\"280\" cy=\"35\" r=\"26\" fill=\"#fff9c4\" opacity=\".8\"/><circle cx=\"280\" cy=\"35\" r=\"18\" fill=\"#ffe57f\"/><path d=\"M0,72 Q60,60 120,66 Q180,60 240,66 Q295,60 340,66 L340,84 L0,84Z\" fill=\"#66bb6a\" opacity=\".8\"/><path d=\"M140,90 Q160,82 200,86 Q220,89 240,86 L235,100 Q215,103 195,100 Q165,97 145,95Z\" fill=\"#4e342e\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">PESCA ESPORTIVA</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Captura e soltura</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Turismo: de alto valor</text></svg>","nar":"No flutuante, um grupo de turistas pesca dourado com captura e soltura. Guias registram cada peixe. Como funciona o turismo de pesca esportiva praticado no Pantanal?","q":"Como funciona o turismo de pesca esportiva praticada no Pantanal?","cs":[{"l":"?","t":"Pesca com captura e soltura em flutuantes, guiada por profissionais locais credenciados","p":10,"e":"✅","tp":"c","fb":"Correto! A pesca esportiva praticada nos flutuantes do Pantanal é baseada em captura e soltura obrigatória para espécies nobres. Guias locais credenciados são essenciais para a experiência."},{"l":"?","t":"Pesca comercial com cotas diárias liberadas ao turista e controladas pelo governo","p":0,"e":"❌","tp":"x","fb":"Pesca COMERCIAL e turismo de pesca são atividades distintas. O turismo de pesca esportiva é baseado em captura e soltura — não em comercialização do pescado."},{"l":"?","t":"Pesca de espécies exóticas cultivadas em tanques privados dentro de fazendas","p":0,"e":"❌","tp":"x","fb":"O turismo de pesca pantaneiro busca espécies nativas nobres (dourado, pintado, pacu) em ambiente natural, não espécies exóticas em piscicultura. A experiência em rio aberto é o atrativo."}]},{"n":5,"title":"Observação de Aves","sub":"Birdwatching – Pousada Porto Cercado","icon":"🔭","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"ge3f2\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#e3f2fd\"/><stop offset=\"100%\" stop-color=\"#1b5e20\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#ge3f2)\"/><rect y=\"80\" width=\"340\" height=\"90\" fill=\"#29b6f6\" opacity=\".8\"/><line x1=\"0\" y1=\"95\" x2=\"340\" y2=\"95\" stroke=\"rgba(255,255,255,.3)\" stroke-width=\"1.5\"/><circle cx=\"280\" cy=\"35\" r=\"26\" fill=\"#fff9c4\" opacity=\".8\"/><circle cx=\"280\" cy=\"35\" r=\"18\" fill=\"#ffe57f\"/><path d=\"M0,72 Q60,60 120,66 Q180,60 240,66 Q295,60 340,66 L340,84 L0,84Z\" fill=\"#66bb6a\" opacity=\".8\"/><path d=\"M140,90 Q160,82 200,86 Q220,89 240,86 L235,100 Q215,103 195,100 Q165,97 145,95Z\" fill=\"#4e342e\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">BIRDWATCHING</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">650+ espécies registradas</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Alta visibilidade: campos abertos</text></svg>","nar":"Um grupo de observadores de aves chegou do Canadá. Em dois dias já listaram 180 espécies. Por que o Pantanal é destino prioritário para birdwatchers do mundo inteiro?","q":"Por que o Pantanal é destino prioritário para observadores de aves mundialmente?","cs":[{"l":"?","t":"Registra mais de 650 espécies com altíssima visibilidade nos campos e margens aquáticas","p":10,"e":"✅","tp":"c","fb":"Correto! O Pantanal tem 650+ espécies de aves. A combinação de alta diversidade e excelente visibilidade em campos abertos e margens de água é única. É destino obrigatório no birdwatching mundial."},{"l":"?","t":"Possui espécies totalmente extintas nos outros biomas e encontradas somente aqui","p":0,"e":"❌","tp":"x","fb":"O Pantanal não tem espécies extintas em outros biomas que só existam aqui. O diferencial é a VISIBILIDADE excepcional e a grande diversidade em área relativamente acessível."},{"l":"?","t":"Supera a Amazônia em número de espécies e oferece acesso mais fácil às matas","p":0,"e":"❌","tp":"x","fb":"A Amazônia tem mais espécies de aves que o Pantanal. O diferencial pantaneiro é a VISIBILIDADE — os campos abertos permitem observar espécies que na Amazônia ficam escondidas nas copas."}]},{"n":6,"title":"Impactos do Turismo","sub":"Análise de Impacto – Pesquisa","icon":"⚠️","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"gfff3\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#fff3e0\"/><stop offset=\"100%\" stop-color=\"#bf360c\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#gfff3)\"/><rect y=\"110\" width=\"340\" height=\"60\" fill=\"#8d6e63\" opacity=\".6\"/><path d=\"M0,100 Q80,88 170,96 Q255,88 340,96 L340,114 L0,114Z\" fill=\"#a5d6a7\" opacity=\".7\"/><rect x=\"220\" y=\"62\" width=\"50\" height=\"40\" rx=\"4\" fill=\"#8d6e63\"/><rect x=\"218\" y=\"50\" width=\"54\" height=\"16\" rx=\"3\" fill=\"#6d4c41\"/><rect x=\"238\" y=\"60\" width=\"8\" height=\"42\" rx=\"1\" fill=\"#5d4037\"/><path d=\"M180,105 Q200,96 240,100 Q260,103 280,100 L275,115 Q255,118 235,114 Q205,112 185,110Z\" fill=\"#4e342e\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">TURISMO E CONSERVAÇÃO</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Benefício vs. impacto</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Gestão: essencial</text></svg>","nar":"Você analisa os impactos do turismo em uma área com alta visitação. Trilhas degradadas, barcos em excesso, espécies exóticas introduzidas. Qual é o principal risco do turismo não gerenciado?","q":"Qual é o principal risco do turismo mal gerenciado para o Pantanal?","cs":[{"l":"?","t":"Perturbação da fauna, erosão de margens e introdução de espécies exóticas invasoras","p":10,"e":"✅","tp":"c","fb":"Correto! Os três principais impactos do turismo não gerenciado são: perturbação comportamental da fauna, erosão de margens por embarcações e introdução de espécies exóticas por embarcações e visitantes."},{"l":"?","t":"Excesso de lixo orgânico dos barcos que eutrofiza as lagoas e elimina peixes","p":0,"e":"❌","tp":"x","fb":"Lixo é um problema real, mas os impactos mais críticos são a perturbação direta da fauna (especialmente onças e araras), a erosão das margens e as espécies exóticas como tilápias e mexilhão dourado."},{"l":"?","t":"Aquecimento local causado pelo calor gerado pelos veículos e embarcações turísticas","p":0,"e":"❌","tp":"x","fb":"O aquecimento local por veículos é desprezível em escala de ecossistema. Os impactos relevantes do turismo são biológicos (perturbação de fauna, espécies exóticas) e físicos (erosão de margens)."}]},{"n":7,"title":"Turismo Comunitário","sub":"Comunidade Ribeirinha – Visita","icon":"🤝","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"ge8f5\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#e8f5e9\"/><stop offset=\"100%\" stop-color=\"#006064\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#ge8f5)\"/><rect y=\"110\" width=\"340\" height=\"60\" fill=\"#8d6e63\" opacity=\".6\"/><path d=\"M0,100 Q80,88 170,96 Q255,88 340,96 L340,114 L0,114Z\" fill=\"#a5d6a7\" opacity=\".7\"/><rect x=\"220\" y=\"62\" width=\"50\" height=\"40\" rx=\"4\" fill=\"#8d6e63\"/><rect x=\"218\" y=\"50\" width=\"54\" height=\"16\" rx=\"3\" fill=\"#6d4c41\"/><rect x=\"238\" y=\"60\" width=\"8\" height=\"42\" rx=\"1\" fill=\"#5d4037\"/><path d=\"M180,105 Q200,96 240,100 Q260,103 280,100 L275,115 Q255,118 235,114 Q205,112 185,110Z\" fill=\"#4e342e\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">TURISMO COMUNITÁRIO</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Renda local e conservação</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Modelo: base comunitária</text></svg>","nar":"Você visita uma comunidade ribeirinha que recebe turistas para passeios de canoa, culinária e artesanato. Como o turismo de base comunitária beneficia as famílias pantaneiras?","q":"Como o turismo de base comunitária beneficia as comunidades pantaneiras?","cs":[{"l":"?","t":"Gera renda alternativa, valoriza a cultura local e fortalece a conservação ambiental","p":10,"e":"✅","tp":"c","fb":"Correto! O turismo comunitário é uma solução que conjuga renda para comunidades locais, valorização cultural e incentivo à conservação — porque a natureza preservada é o produto turístico principal."},{"l":"?","t":"Substitui completamente a pecuária e garante renda maior a todos os moradores","p":0,"e":"❌","tp":"x","fb":"O turismo comunitário é COMPLEMENTAR, não substituto da pecuária. A substituição total seria irrealista e geraria vulnerabilidade econômica pela dependência de um único setor."},{"l":"?","t":"É gerenciado por empresas externas que repassam percentual fixo às famílias locais","p":0,"e":"❌","tp":"x","fb":"Turismo de BASE COMUNITÁRIA é, por definição, gerenciado pelas próprias comunidades. A gestão externa com repasse define um modelo diferente — o do turismo convencional com benefício comunitário."}]}]},
{"id":"peculiar","icon":"🦟","title":"Peculiaridades Pantaneiras","sub":"Fenômenos únicos do bioma","color":"#6a1b9a","diff":2,"phases":[{"n":1,"title":"A Decoada","sub":"Lagoa Seca – Fenômeno Natural","icon":"🐠","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"gefeb\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#efebe9\"/><stop offset=\"100%\" stop-color=\"#37474f\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#gefeb)\"/><rect y=\"98\" width=\"340\" height=\"72\" fill=\"#0277bd\" opacity=\".78\"/><line x1=\"0\" y1=\"112\" x2=\"340\" y2=\"112\" stroke=\"rgba(255,255,255,.3)\" stroke-width=\"1.5\"/><line x1=\"30\" y1=\"130\" x2=\"120\" y2=\"130\" stroke=\"rgba(255,255,255,.22)\" stroke-width=\"1\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">DECOADA</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Hipóxia natural — O₂ < 1 mg/L</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Mortandade: de peixes — sazonal</text></svg>","nar":"Uma lagoa está seca em mais de 90%. Centenas de peixes mortos flutuam na superfície. O cheiro é forte. O guia explica: \"É a decoada\". O que é esse fenômeno e quando ocorre?","q":"O que é a decoada e quando ocorre no Pantanal?","cs":[{"l":"?","t":"Mortandade natural de peixes por hipóxia quando lagoas secam e o oxigênio despenca","p":10,"e":"✅","tp":"c","fb":"Correto! A decoada ocorre quando lagoas quase secam na estiagem. O oxigênio dissolvido cai para valores letais (abaixo de 1 mg/L) pela decomposição intensa e alta temperatura. É fenômeno natural e recorrente."},{"l":"?","t":"Migração massiva de peixes para áreas mais fundas durante o pico da estiagem","p":0,"e":"❌","tp":"x","fb":"A decoada é MORTANDADE, não migração. Ocorre quando o volume de água é tão pequeno que a decomposição e o calor consomem todo o oxigênio disponível, matando os peixes que não escapam."},{"l":"?","t":"Floração tóxica de algas que envenena a água durante os primeiros dias da cheia","p":0,"e":"❌","tp":"x","fb":"A floração de cianobactérias é fenômeno diferente. A decoada ocorre na SECA, por hipóxia na água rasa e quente, não por toxinas de algas durante a cheia."}]},{"n":2,"title":"Os Guató","sub":"Rio Paraguai – Patrimônio Cultural","icon":"🛶","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"ge3f2\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#e3f2fd\"/><stop offset=\"100%\" stop-color=\"#1b5e20\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#ge3f2)\"/><rect y=\"98\" width=\"340\" height=\"72\" fill=\"#0277bd\" opacity=\".78\"/><line x1=\"0\" y1=\"112\" x2=\"340\" y2=\"112\" stroke=\"rgba(255,255,255,.3)\" stroke-width=\"1.5\"/><line x1=\"30\" y1=\"130\" x2=\"120\" y2=\"130\" stroke=\"rgba(255,255,255,.22)\" stroke-width=\"1\"/><line x1=\"40\" y1=\"98\" x2=\"40\" y2=\"30\" stroke=\"#33691e\" stroke-width=\"4\"/><ellipse cx=\"40\" cy=\"28\" rx=\"20\" ry=\"9\" fill=\"#2e7d32\"/><line x1=\"290\" y1=\"98\" x2=\"288\" y2=\"35\" stroke=\"#33691e\" stroke-width=\"3.5\"/><ellipse cx=\"288\" cy=\"33\" rx=\"18\" ry=\"8\" fill=\"#1b5e20\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">POVO GUATÓ</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Canoeiros do Pantanal</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Patrimônio: cultural imaterial</text></svg>","nar":"No museu de Cáceres, você vê uma canoa escavada em tronco e armas de pesca. São dos Guató, povo indígena que viveu no Pantanal por milênios. Quem são eles?","q":"Quem são os Guató e qual é sua relação histórica com o Pantanal?","cs":[{"l":"?","t":"Povo indígena aquático que navegou e pescou nas lagoas pantaneiras por milênios","p":10,"e":"✅","tp":"c","fb":"Correto! Os Guató são considerados o povo indígena mais adaptado à vida aquática do Brasil. Viviam em canoas, pescavam nos rios e lagoas do Pantanal e chamavam esse bioma de lar por milênios."},{"l":"?","t":"Grupo de vaqueiros descendentes de colonos portugueses do Pantanal do século XVIII","p":0,"e":"❌","tp":"x","fb":"Os Guató são povo INDÍGENA, não descendentes de colonos. Sua presença no Pantanal precede em milênios a chegada dos portugueses ao Brasil. São um dos grupos indígenas mais antigos da região."},{"l":"?","t":"Comunidade quilombola que desenvolveu técnicas únicas de pesca artesanal nos rios","p":0,"e":"❌","tp":"x","fb":"Os Guató são povo INDÍGENA, não quilombola. Sua identidade é única: são os \"canoeiros do Pantanal\", povo que organizou toda sua cultura em torno da vida aquática nos rios e lagoas."}]},{"n":3,"title":"O Cerrado e as Águas","sub":"Planalto de Mato Grosso – Nascentes","icon":"💧","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"ge8f5\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#e8f5e9\"/><stop offset=\"100%\" stop-color=\"#0277bd\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#ge8f5)\"/><rect y=\"105\" width=\"340\" height=\"65\" fill=\"#43a047\" opacity=\".6\"/><path d=\"M0,96 Q60,84 120,90 Q180,84 240,90 Q290,84 340,90 L340,108 L0,108Z\" fill=\"#a5d6a7\"/><line x1=\"60\" y1=\"105\" x2=\"60\" y2=\"18\" stroke=\"#5d4037\" stroke-width=\"5\"/><ellipse cx=\"60\" cy=\"16\" rx=\"24\" ry=\"11\" fill=\"#1b5e20\"/><ellipse cx=\"60\" cy=\"9\" rx=\"18\" ry=\"8\" fill=\"#2e7d32\"/><line x1=\"160\" y1=\"105\" x2=\"158\" y2=\"28\" stroke=\"#4e342e\" stroke-width=\"4\"/><ellipse cx=\"158\" cy=\"26\" rx=\"20\" ry=\"9\" fill=\"#33691e\"/><line x1=\"270\" y1=\"105\" x2=\"268\" y2=\"22\" stroke=\"#5d4037\" stroke-width=\"5\"/><ellipse cx=\"268\" cy=\"20\" rx=\"22\" ry=\"10\" fill=\"#1b5e20\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">CERRADO</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Berço das águas do Pantanal</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Nascentes: rios que formam a bacia</text></svg>","nar":"No Planalto de Mato Grosso, você visita uma nascente do Rio Cuiabá — rio que alimenta o Pantanal. Por que a conservação do Cerrado é vital para o Pantanal?","q":"Por que conservar o Cerrado é fundamental para a saúde hídrica do Pantanal?","cs":[{"l":"?","t":"O Cerrado abriga as nascentes dos rios que abastecem e enchem o Pantanal anualmente","p":10,"e":"✅","tp":"c","fb":"Correto! O Cerrado é a caixa-dagua do Brasil. Rios como Paraguai, Cuiabá, São Lourenço e Taquari nascem no Cerrado. O desmatamento do Planalto reduz a recarga hídrica do Pantanal."},{"l":"?","t":"O Cerrado filtra poluentes industriais antes que cheguem às lagoas pantaneiras abaixo","p":0,"e":"❌","tp":"x","fb":"A filtragem de poluentes é um serviço ecossistêmico real do Cerrado, mas o papel mais crítico para o Pantanal é hidrológico: as nascentes dos principais rios pantaneiros estão no Cerrado."},{"l":"?","t":"O Cerrado controla a temperatura regional, reduzindo a evaporação das lagoas","p":0,"e":"❌","tp":"x","fb":"O controle térmico regional é um serviço ecossistêmico menor comparado ao hidrológico. O Cerrado importa ao Pantanal principalmente por abrigar as nascentes dos rios que o abastecem."}]},{"n":4,"title":"Rios Voadores","sub":"Atmosfera Amazônica – Fenômeno","icon":"☁️","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"ge3f2\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#e3f2fd\"/><stop offset=\"100%\" stop-color=\"#0277bd\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#ge3f2)\"/><rect y=\"98\" width=\"340\" height=\"72\" fill=\"#0277bd\" opacity=\".78\"/><line x1=\"0\" y1=\"112\" x2=\"340\" y2=\"112\" stroke=\"rgba(255,255,255,.3)\" stroke-width=\"1.5\"/><line x1=\"30\" y1=\"130\" x2=\"120\" y2=\"130\" stroke=\"rgba(255,255,255,.22)\" stroke-width=\"1\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">RIOS VOADORES</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Vapor amazônico → Centro-Oeste</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Chuvas: no Pantanal</text></svg>","nar":"O meteorologista explica: os rios voadores transportam vapor da Amazônia até o Centro-Oeste. Como esse fenômeno influencia as chuvas e as águas do Pantanal?","q":"Como os rios voadores influenciam a disponibilidade de água no Pantanal?","cs":[{"l":"?","t":"Transportam vapor amazônico ao Centro-Oeste, alimentando as chuvas que abastecem o Pantanal","p":10,"e":"✅","tp":"c","fb":"Correto! Os rios voadores são correntes de vapor de água que a Amazônia envia ao Centro-Oeste. Eles respondem por parte significativa das chuvas que abastecem o Pantanal. O desmatamento amazônico ameaça esse fluxo."},{"l":"?","t":"São correntes de ar frio que geram geadas nas cabeceiras dos rios pantaneiros","p":0,"e":"❌","tp":"x","fb":"Rios voadores não são correntes frias nem geram geadas. São correntes de vapor de água quente e úmido que fluem da Amazônia para o Centro-Sul do Brasil, carregando umidade preciosa."},{"l":"?","t":"Ventos oceânicos úmidos do Atlântico que aumentam a umidade das lagoas abertas","p":0,"e":"❌","tp":"x","fb":"Rios voadores são de origem AMAZÔNICA, não oceânica. São a umidade evapotranspirada pela floresta amazônica que viaja como vapor pelo interior do continente até o Pantanal e o Sul."}]},{"n":5,"title":"A Importância dos Mosquitos","sub":"Campos do Pantanal – Entardecer","icon":"🦟","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"ge8f5\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#e8f5e9\"/><stop offset=\"100%\" stop-color=\"#1b5e20\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#ge8f5)\"/><rect y=\"98\" width=\"340\" height=\"72\" fill=\"#0277bd\" opacity=\".78\"/><line x1=\"0\" y1=\"112\" x2=\"340\" y2=\"112\" stroke=\"rgba(255,255,255,.3)\" stroke-width=\"1.5\"/><line x1=\"30\" y1=\"130\" x2=\"120\" y2=\"130\" stroke=\"rgba(255,255,255,.22)\" stroke-width=\"1\"/><line x1=\"40\" y1=\"98\" x2=\"40\" y2=\"30\" stroke=\"#33691e\" stroke-width=\"4\"/><ellipse cx=\"40\" cy=\"28\" rx=\"20\" ry=\"9\" fill=\"#2e7d32\"/><line x1=\"290\" y1=\"98\" x2=\"288\" y2=\"35\" stroke=\"#33691e\" stroke-width=\"3.5\"/><ellipse cx=\"288\" cy=\"33\" rx=\"18\" ry=\"8\" fill=\"#1b5e20\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">MOSQUITOS</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Culicidae + outras famílias</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Elo da: cadeia trófica</text></svg>","nar":"Entardecer. Nuvens de mosquitos emergem das lagoas. O turista reclama, você explica sua importância. Qual é a função ecológica real dos mosquitos no Pantanal?","q":"Qual é a função ecológica dos mosquitos no Pantanal?","cs":[{"l":"?","t":"São polinizadores, elos da cadeia trófica e alimento essencial de peixes e morcegos","p":10,"e":"✅","tp":"c","fb":"Correto! Mosquitos adultos polinizam flores pequenas, as larvas são alimento de peixes e girinos, os adultos alimentam morcegos, andorinhões e aves insetívoras. São elo nutricional essencial!"},{"l":"?","t":"São pragas sem função ecológica que apenas transmitem doenças à fauna e ao homem","p":0,"e":"❌","tp":"x","fb":"Mosquitos têm função ecológica documentada. São polinizadores de várias plantas e alimento de múltiplos vertebrados. Sua eliminação causaria colapso em cadeias alimentares inteiras."},{"l":"?","t":"Controlam macrófitas ao se alimentarem de suas raízes e dispersarem propágulos","p":0,"e":"❌","tp":"x","fb":"Larvas de mosquito se alimentam de detritos e microalgas em suspensão na água, não de raízes de macrófitas. Sua função principal é ser elo na cadeia trófica e polinizador."}]},{"n":6,"title":"Peixes e Temperatura","sub":"Lagoa Aquecida – Monitoramento","icon":"🌡️","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"ge3f2\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#e3f2fd\"/><stop offset=\"100%\" stop-color=\"#0277bd\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#ge3f2)\"/><rect y=\"98\" width=\"340\" height=\"72\" fill=\"#0277bd\" opacity=\".78\"/><line x1=\"0\" y1=\"112\" x2=\"340\" y2=\"112\" stroke=\"rgba(255,255,255,.3)\" stroke-width=\"1.5\"/><line x1=\"30\" y1=\"130\" x2=\"120\" y2=\"130\" stroke=\"rgba(255,255,255,.22)\" stroke-width=\"1\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">TEMPERATURA DA ÁGUA</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">29°C → comportamento alterado</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Peixes: ectotérmicos</text></svg>","nar":"O sensor registra 32°C na baía rasa. Você observa peixes agrupados perto das margens sombreadas. Como a temperatura da água interfere diretamente na biologia dos peixes?","q":"Como a temperatura da água interfere na biologia dos peixes pantaneiros?","cs":[{"l":"?","t":"Controla o metabolismo, a reprodução e os ciclos migratórios das espécies ectotérmicas","p":10,"e":"✅","tp":"c","fb":"Correto! Peixes são ectotérmicos (de sangue frio) — sua temperatura corporal segue a da água. A temperatura regula o metabolismo, a digestão, a maturação gonadal e desencadeia migrações reprodutivas."},{"l":"?","t":"Nao afeta os peixes, que regulam a própria temperatura internamente como mamíferos","p":0,"e":"❌","tp":"x","fb":"Peixes são ECTOTÉRMICOS, não endotérmicos. Eles não regulam a temperatura internamente. A temperatura da água é um dos fatores abióticos mais determinantes para sua fisiologia e comportamento."},{"l":"?","t":"Afeta somente espécies de altitude; nas planícies os peixes toleram qualquer temperatura","p":0,"e":"❌","tp":"x","fb":"Todos os peixes, independente da altitude, são sensíveis à temperatura. Nos trópicos, a variação sazonal (20 a 34°C no Pantanal) tem efeitos profundos no metabolismo, reprodução e distribuição."}]},{"n":7,"title":"Defeso e Piracema","sub":"Rio Paraguai – Proteção Legal","icon":"🛡️","svg":"<svg viewBox=\"0 0 340 170\" xmlns=\"http://www.w3.org/2000/svg\"><defs><linearGradient id=\"ge3f2\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#e3f2fd\"/><stop offset=\"100%\" stop-color=\"#1b5e20\"/></linearGradient></defs><rect width=\"340\" height=\"170\" fill=\"url(#ge3f2)\"/><rect y=\"98\" width=\"340\" height=\"72\" fill=\"#0277bd\" opacity=\".78\"/><line x1=\"0\" y1=\"112\" x2=\"340\" y2=\"112\" stroke=\"rgba(255,255,255,.3)\" stroke-width=\"1.5\"/><line x1=\"30\" y1=\"130\" x2=\"120\" y2=\"130\" stroke=\"rgba(255,255,255,.22)\" stroke-width=\"1\"/><rect x=\"5\" y=\"5\" width=\"220\" height=\"46\" rx=\"6\" fill=\"rgba(0,0,0,.62)\"/><text x=\"115\" y=\"18\" text-anchor=\"middle\" fill=\"#a5d6a7\" font-size=\"9\" font-family=\"monospace\">PERÍODO DE DEFESO</text><text x=\"115\" y=\"30\" text-anchor=\"middle\" fill=\"white\" font-size=\"10\" font-family=\"monospace\" font-weight=\"bold\">Out-fev: pesca proibida</text><text x=\"115\" y=\"43\" text-anchor=\"middle\" fill=\"#80cbc4\" font-size=\"8\" font-family=\"monospace\">Protege: piracema e estoques</text></svg>","nar":"Placa na margem: \"Proibida a pesca — Período de Defeso\". Um pescador explica a importância. O que é o defeso e por que ele coincide com o período de piracema?","q":"O que é o defeso e por que ele coincide com a piracema?","cs":[{"l":"?","t":"Proibição legal da pesca durante a reprodução dos peixes para garantir renovação dos estoques","p":10,"e":"✅","tp":"c","fb":"Correto! O defeso é a proibição sazonal da pesca durante o período de reprodução (piracema). Garante que os peixes se reproduzam sem pressão de captura, renovando os estoques. É política de pesca sustentável."},{"l":"?","t":"Época de pesca livre autorizada para turistas durante a migração reprodutiva dos peixes","p":0,"e":"❌","tp":"x","fb":"O defeso é o OPOSTO: é a PROIBIÇÃO da pesca durante a piracema. O objetivo é proteger os peixes enquanto se reproduzem, não liberar a pesca durante esse período crítico."},{"l":"?","t":"Período de manutenção obrigatória de barcos e equipamentos pelos pescadores artesanais","p":0,"e":"❌","tp":"x","fb":"A manutenção de equipamentos não é o conceito de defeso. O defeso é a PROIBIÇÃO da pesca durante a época de reprodução — a piracema — para garantir a renovação dos estoques pesqueiros."}]}]}
];

/* ── STATE ── */
const $=id=>document.getElementById(id);
const R=h=>document.getElementById('root').innerHTML=h;
let EXP=null, G={};
let PLAYER = localStorage.getItem('ep_player') || '';

/* ── UTILS ── */
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}
  return a;
}
const stars=n=>Array.from({length:3},(_,i)=>`<span style="color:${i<n?'#f9a825':'#e0e0e0'};font-size:14px">★</span>`).join('');
const dots=()=>EXP.phases.map((_,i)=>`<div class="dot" style="background:${i<G.ph?'white':i===G.ph?'rgba(255,255,255,.95)':'rgba(255,255,255,.28)'};width:${i===G.ph?22:10}px"></div>`).join('');
const sCol=p=>p===10?'#1b5e20':p===5?'#e65100':'#c62828';
const fmtTime=s=>{const m=Math.floor(s/60);return m>0?`${m}m ${s%60}s`:`${s}s`};
function jq2(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

/* ── FIREBASE ── */
async function fbSave(data){
  if(!FB_URL)return false;
  try{
    const r=await fetch(FB_URL+'/rankings.json',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(data)
    });
    return r.ok;
  }catch{return false;}
}
async function fbGet(){
  if(!FB_URL)return null;
  try{
    const r=await fetch(FB_URL+'/rankings.json?orderBy="score"&limitToLast=500');
    if(!r.ok)return null;
    const d=await r.json();
    if(!d)return[];
    return Object.values(d);
  }catch{return null;}
}

/* ── LOCAL RANKING ── */
function getRanksLocal(){
  try{return JSON.parse(localStorage.getItem('ep_ranks')||'[]')}catch{return[]}
}
function saveRankLocal(data){
  const r=getRanksLocal();
  r.push(data);
  r.sort((a,b)=>b.score!==a.score?b.score-a.score:a.secs-b.secs);
  localStorage.setItem('ep_ranks',JSON.stringify(r.slice(0,300)));
}

/* ── SAVE RANK ── */
window.doSaveRank=async function(){
  const inp=$('rankName');
  const name=(inp&&inp.value.trim())||PLAYER||'Anônimo';
  PLAYER=name; localStorage.setItem('ep_player',name);
  const data={name,expId:G.expId,expTitle:G.expTitle,score:G.score,maxScore:G.maxScore,secs:G.elapsed,date:new Date().toLocaleDateString('pt-BR')};
  saveRankLocal(data);
  if(FB_URL){
    const btn=$('savebtn');
    if(btn){btn.disabled=true;btn.innerHTML='<div class=\"loading-ring\"></div>';}
    await fbSave(data);
  }
  renderEnding(true);
};
window.skipRank=()=>renderEnding(true);
window.clearRanks=function(){
  if(confirm('Apagar ranking local?')){localStorage.removeItem('ep_ranks');renderRanking();}
};

   INTRO NARRATIVE

window.startGame=function(){
  const inp=$('pname');

window.loadExp=function(id){
  EXP=EXPEDITIONS.find(e=>e.id===id);
  G={ph:0,score:0,ch:null,chOrig:null,startTime:Date.now(),expId:id,expTitle:EXP.title,
    maxScore:EXP.phases.length*10,saved:false,
    shuffled:EXP.phases.map(()=>shuffle([0,1,2]))};
  renderPhase();
};

function renderPhase(){
  G.ch=null; G.chOrig=null;
  const ph=EXP.phases[G.ph];
  const order=G.shuffled[G.ph];
  const choices=order.map((origIdx,di)=>{
    const c=ph.cs[origIdx];
    const lbl=String.fromCharCode(65+di);
    return `<button class="cbtn" onclick="sel(${di})" style="border-color:#e0e0e0;color:#212121;margin-bottom:8px">
      <span style="background:#f5f5f5;border-radius:8px;padding:2px 9px;font-size:12px;font-weight:800;margin-right:10px;color:#616161">${lbl}</span>
      ${jq2(c.t)}
    </button>`;
  }).join('');
  const elapsed=Math.floor((Date.now()-G.startTime)/1000);
  R(`<div class="sc" style="background:#fafafa">
    <div style="background:${EXP.color};padding:16px 18px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <button class="btn" onclick="renderHub()" style="background:rgba(255,255,255,.2);color:white;padding:7px 14px;font-size:13px">← Hub</button>
        <div style="color:rgba(255,255,255,.9);font-size:13px;font-weight:700">⏱️ ${fmtTime(elapsed)} &nbsp;|&nbsp; ⭐ ${G.score}</div>
      </div>
      <div style="display:flex;gap:5px;margin-bottom:12px">${dots()}</div>
      <div style="color:rgba(255,255,255,.8);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px">${EXP.icon} Fase ${G.ph+1}/${EXP.phases.length} · ${jq2(PLAYER)}</div>
      <div style="color:white;font-size:18px;font-weight:800;font-family:'Fraunces',serif">${ph.title}</div>
      <div style="color:rgba(255,255,255,.7);font-size:12px">${ph.sub}</div>
    </div>
    <div style="padding:16px 18px;max-width:680px;margin:0 auto;width:100%">
      <div style="border-radius:14px;overflow:hidden;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.1)">
        <img src="data:image/svg+xml;base64,${btoa(unescape(encodeURIComponent(ph.svg)))}" style="width:100%;display:block;border-radius:14px"/>
      </div>
      <div class="card" style="margin-bottom:14px;font-size:14px;line-height:1.65;color:#333">${ph.nar}</div>
      <div class="card">
        <div style="font-size:13px;font-weight:800;color:#424242;margin-bottom:12px;text-transform:uppercase;letter-spacing:.4px">📋 Decisão de Campo</div>
        <div style="font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:14px;line-height:1.5">${ph.q}</div>
        ${choices}
      </div>
    </div>
  </div>`);
}

window.sel=function(di){
  if(G.ch!==null)return;
  G.ch=di; G.chOrig=G.shuffled[G.ph][di];
  G.score+=EXP.phases[G.ph].cs[G.chOrig].p;
  renderFeedback();
};

function renderFeedback(){
  const ph=EXP.phases[G.ph];
  const c=ph.cs[G.chOrig];
  const order=G.shuffled[G.ph];
  const elapsed=Math.floor((Date.now()-G.startTime)/1000);
  const mImg = c.p===10 ? MATIAS_WINK_IMG : c.p===5 ? MATIAS_IMG : MATIAS_SAD_IMG;
  const mMsg = c.p===10
    ? ['Muito bem! Exatamente isso.','Correto! Bom raciocínio.','Perfeito! É isso.','Excelente decisão de campo!'][G.ph%4]
    : c.p===5
    ? ['Parcialmente certo. Veja o detalhe.','Quase! Faltou precisão.','Na direção certa, mas incompleto.'][G.ph%3]
    : ['Não desta vez. Aprenda e avance.','Errado. Veja a explicação.','Cuidado! A ciência é precisa.'][G.ph%3];

  const choiceBtns=order.map((origIdx,di)=>{
    const ci=ph.cs[origIdx];
    const lbl=String.fromCharCode(65+di);
    let bg='#fafafa',bc='#e0e0e0',co='#9e9e9e';
    if(ci.tp==='c'){bg='#e8f5e9';bc='#2e7d32';co='#1b5e20';}
    else if(di===G.ch){bg='#ffebee';bc='#c62828';co='#b71c1c';}
    return `<div style="border-radius:12px;padding:12px 15px;font-size:13.5px;font-weight:600;border:2.5px solid ${bc};background:${bg};color:${co};margin-bottom:7px;line-height:1.5">
      <span style="background:${bc}22;border-radius:8px;padding:2px 8px;font-size:11px;font-weight:800;margin-right:8px">${lbl}</span>
      ${ci.tp==='c'?'✅ ':di===G.ch?'❌ ':''}<span style="opacity:${ci.tp==='c'||di===G.ch?1:.5}">${jq2(ci.t)}</span>
    </div>`;
  }).join('');
  const isLast=G.ph===EXP.phases.length-1;

  R(`<div class="sc" style="background:#fafafa">
    <div style="background:${EXP.color};padding:16px 18px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <button class="btn" onclick="renderHub()" style="background:rgba(255,255,255,.2);color:white;padding:7px 14px;font-size:13px">← Hub</button>
        <div style="color:rgba(255,255,255,.9);font-size:13px;font-weight:700">⏱️ ${fmtTime(elapsed)} &nbsp;|&nbsp; ⭐ ${G.score}</div>
      </div>
      <div style="display:flex;gap:5px;margin-bottom:10px">${dots()}</div>
      <div style="display:inline-block;background:rgba(255,255,255,.22);color:white;border-radius:20px;padding:5px 16px;font-size:15px;font-weight:800">
        ${c.e} +${c.p} pontos
      </div>
    </div>
    <div style="padding:16px 18px;max-width:680px;margin:0 auto;width:100%">
      <div style="display:flex;gap:12px;align-items:flex-end;margin-bottom:14px">
        <img src="${mImg}" style="width:60px;flex-shrink:0;filter:drop-shadow(0 2px 8px rgba(0,0,0,.2))"/>
        <div class="bubble sUp" style="background:#e8f5e9;border-radius:18px 18px 18px 4px;flex:1">
          <div style="font-size:11px;color:#9e9e9e;margin-bottom:4px;font-weight:700">Jaçanã</div>
          <div style="font-size:13px;font-weight:700;color:${sCol(c.p)};margin-bottom:6px">${mMsg}</div>
          <p style="font-size:13.5px;line-height:1.6;color:#333">${jq2(c.fb)}</p>
        </div>
      </div>
      <div class="card" style="margin-bottom:14px">${choiceBtns}</div>
      <div style="text-align:center">
        <button class="btn" onclick="next()" style="background:${EXP.color};color:white;padding:14px 40px;font-size:16px;border-radius:14px">
          ${isLast?'Ver Resultado 🎯':'Próxima Fase →'}
        </button>
      </div>
    </div>
  </div>`);
}

window.next=function(){
  G.ph++;
  if(G.ph>=EXP.phases.length){
    G.elapsed=Math.floor((Date.now()-G.startTime)/1000);
    renderSaveModal();

};
